name: Deploy

on:
  # Push to the main branch
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "packages/**"
      - "!**.md"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - ".dockerignore"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Build and publish the commit to docker
  docker:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'growthbook/growthbook' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      docker_sha: ${{ steps.metadata.outputs.docker_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Required to pull the hardened base image (FROM dhi.io/...) in the Dockerfile.
      # Depot forwards these credentials to its remote builder.
      - name: Login to Docker Hardened Images
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Configure AWS credentials for ECR
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Depot CLI
        uses: depot/setup-action@v1

      - name: Prepare build metadata
        id: metadata
        run: |
          # Store current git hash and date in files
          mkdir -p buildinfo
          echo "${GITHUB_SHA}" > buildinfo/SHA
          printf '%(%Y-%m-%dT%H:%M:%SZ)T' > buildinfo/DATE
          echo "docker_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to Docker Hub and ECR
        uses: depot/build-push-action@v1
        with:
          push: true
          context: .
          project: vmp2ssvj9r
          build-args: |
            DD_GIT_COMMIT_SHA=${{ github.sha }}
            DD_GIT_REPOSITORY_URL=https://github.com/growthbook/growthbook.git
            DD_VERSION=${{ github.sha }}
          # No ECR :latest — the ECR repo is immutable, so we push only the
          # unique git-<sha> tag. Docker Hub :latest stays for self-host.
          tags: |
            growthbook/growthbook:latest
            growthbook/growthbook:git-${{ steps.metadata.outputs.docker_sha }}
            ${{ steps.login-ecr.outputs.registry }}/growthbook:git-${{ steps.metadata.outputs.docker_sha }}
          platforms: linux/amd64,linux/arm64

  # Extract front-end static assets to S3 and publish Sentry releases. This runs
  # before the services go live (deploy needs it) so the new app's content-hashed
  # assets are already served when the new revision starts handling requests.
  assets:
    runs-on: ubuntu-latest
    needs: [docker]
    if: ${{ github.repository == 'growthbook/growthbook' }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure AWS credentials for GrowthBook Cloud
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract static assets from Docker image and upload to S3
        env:
          IMAGE: ${{ steps.login-ecr-prod.outputs.registry }}/growthbook:git-${{ needs.docker.outputs.docker_sha }}
        run: |
          docker pull ${IMAGE}
          docker create --name temp-container ${IMAGE}
          docker cp temp-container:/usr/local/src/app/packages/front-end/.next/static ./static
          # Back-end-dist and front-end-dist is for the sentry source maps task below.
          docker cp temp-container:/usr/local/src/app/packages/back-end/dist ./back-end-dist
          # Copy only server/ and static/ to front-end-dist as symlinks in .next/node_modules break docker cp
          mkdir -p front-end-dist
          cp -r ./static ./front-end-dist/static
          docker cp temp-container:/usr/local/src/app/packages/front-end/.next/server ./front-end-dist/server
          docker rm temp-container
          aws s3 sync ./static s3://growthbook-cloud-static-files/_next/static

      - name: Create Sentry api release
        uses: getsentry/action-release@v3
        with:
          environment: "production"
          sourcemaps: "./back-end-dist"
          release: ${{ github.sha }}
          inject: false
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: growthbook
          SENTRY_PROJECT: api

      - name: Create Sentry app release
        uses: getsentry/action-release@v3
        with:
          environment: "production"
          sourcemaps: "./front-end-dist"
          release: ${{ github.sha }}
          inject: false
          url_prefix: "app:///_next"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: growthbook
          SENTRY_PROJECT: app

  # Roll each service to the git-<sha> image we just built. The three services
  # deploy in parallel (matrix) rather than sequentially. Each step registers a
  # new task-definition revision (based on the current one, so env/secrets
  # defined in Terraform carry over) and rolls the service to it.
  deploy:
    runs-on: ubuntu-latest
    needs: [docker, assets]
    if: ${{ github.repository == 'growthbook/growthbook' }}
    strategy:
      # Don't cancel a healthy service's rollout because another service failed.
      fail-fast: false
      matrix:
        include:
          - { service: prod-api, container: api }
          - { service: prod-api-jobs, container: api-jobs }
          - { service: prod-api-python, container: api-python }
    steps:
      - name: Configure AWS credentials for GrowthBook Cloud
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ matrix.service }}
          container-name: ${{ matrix.container }}
          image: ${{ steps.login-ecr-prod.outputs.registry }}/growthbook:git-${{ needs.docker.outputs.docker_sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ matrix.service }}
          cluster: ${{ matrix.service }}
          wait-for-service-stability: true
          # Backstop so a slow (but succeeding) rollout doesn't false-fail the
          # step before ECS finishes. Root fix is the health-check grace period.
          wait-for-minutes: 30
