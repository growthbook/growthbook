  /dashboards:
    post:
      $skipValidatorGeneration: true
      parameters: []
      tags:
        - Dashboards
      summary: Create a single dashboard
      operationId: createDashboard
      x-codeSamples:
        - lang: cURL
          source: 'curl -X POST https://api.growthbook.io/api/v1/dashboards -d ''{ ... }'' -u secret_abc123DEF456'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $schema: 'https://json-schema.org/draft/2020-12/schema'
              type: object
              properties:
                title:
                  description: The display name of the Dashboard
                  type: string
                editLevel:
                  description: Dashboards that are "published" are editable by organization members with appropriate permissions
                  type: string
                  enum:
                    - published
                    - private
                shareLevel:
                  description: General Dashboards only. Dashboards that are "published" are viewable by organization members with appropriate permissions
                  type: string
                  enum:
                    - published
                    - private
                enableAutoUpdates:
                  description: 'If enabled for a General Dashboard, also requires an updateSchedule'
                  type: boolean
                updateSchedule:
                  description: General Dashboards only. Experiment Dashboards update based on the parent experiment instead
                  anyOf:
                    - type: object
                      properties:
                        type:
                          type: string
                          const: stale
                        hours:
                          type: number
                      required:
                        - type
                        - hours
                      additionalProperties: false
                    - type: object
                      properties:
                        type:
                          type: string
                          const: cron
                        cron:
                          type: string
                      required:
                        - type
                        - cron
                      additionalProperties: false
                experimentId:
                  description: 'The parent experiment for an Experiment Dashboard, or undefined for a general dashboard'
                  type: string
                projects:
                  description: 'General Dashboards only, Experiment Dashboards use the experiment''s projects'
                  type: array
                  items:
                    type: string
                blocks:
                  type: array
                  items:
                    anyOf:
                      - type: object
                        properties:
                          type:
                            type: string
                            const: markdown
                          title:
                            type: string
                          description:
                            type: string
                          snapshotId:
                            type: string
                          content:
                            type: string
                        required:
                          - type
                          - title
                          - description
                          - content
                        additionalProperties: false
                      - type: object
                        properties:
                          type:
                            type: string
                            const: experiment-metadata
                          title:
                            type: string
                          description:
                            type: string
                          snapshotId:
                            type: string
                          experimentId:
                            type: string
                          showDescription:
                            type: boolean
                          showHypothesis:
                            type: boolean
                          showVariationImages:
                            type: boolean
                          variationIds:
                            type: array
                            items:
                              type: string
                        required:
                          - type
                          - title
                          - description
                          - experimentId
                          - showDescription
                          - showHypothesis
                          - showVariationImages
                        additionalProperties: false
                      - type: object
                        properties:
                          type:
                            type: string
                            const: experiment-metric
                          title:
                            type: string
                          description:
                            type: string
                          snapshotId:
                            type: string
                          experimentId:
                            type: string
                          metricIds:
                            type: array
                            items:
                              type: string
                          variationIds:
                            type: array
                            items:
                              type: string
                          baselineRow:
                            type: number
                          differenceType:
                            type: string
                            enum:
                              - absolute
                              - relative
                              - scaled
                          columnsFilter:
                            type: array
                            items:
                              type: string
                              enum:
                                - Metric & Variation Names
                                - Baseline Average
                                - Variation Averages
                                - Chance to Win
                                - CI Graph
                                - Lift
                          sliceTagsFilter:
                            type: array
                            items:
                              type: string
                          metricTagFilter:
                            type: array
                            items:
                              type: string
                          sortBy:
                            anyOf:
                              - type: string
                                enum:
                                  - metrics
                                  - metricTags
                                  - significance
                                  - change
                              - type: 'null'
                          sortDirection:
                            anyOf:
                              - type: string
                                enum:
                                  - asc
                                  - desc
                              - type: 'null'
                        required:
                          - type
                          - title
                          - description
                          - snapshotId
                          - experimentId
                          - metricIds
                          - variationIds
                          - baselineRow
                          - differenceType
                          - columnsFilter
                          - sliceTagsFilter
                          - metricTagFilter
                          - sortBy
                          - sortDirection
                        additionalProperties: false
                      - type: object
                        properties:
                          type:
                            type: string
                            const: experiment-dimension
                          title:
                            type: string
                          description:
                            type: string
                          snapshotId:
                            type: string
                          experimentId:
                            type: string
                          dimensionId:
                            type: string
                          dimensionValues:
                            type: array
                            items:
                              type: string
                          metricIds:
