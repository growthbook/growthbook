  /v1/saved-groups/{id}/archive:
    post:
      operationId: archiveSavedGroup
      summary: Archive a single saved group
      description: >-
        Archives a saved group. When live features, experiments, or other saved
        groups still reference it, the request returns a 422 listing the
        blocking gates — re-submit with `"ignoreWarnings": true` in the request
        body to acknowledge the affected references and proceed. If the
        organization requires approval for saved-group changes, the request
        returns an approval-required gate instead: route the change through a
        draft revision (`POST /saved-groups/{id}/revisions`), or use a role or
        token with the bypass-approvals permission. Any gate the caller's
        authority bypasses is reported in `bypassedGates` on success.
      tags:
        - saved-groups
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ignoreWarnings:
                  description: >-
                    Acknowledge and proceed past ACKNOWLEDGE-class warnings: a
                    value served to a running experiment, a locked dependent,
                    and dependents dropped by an archive. A blocked request
                    lists what this would acknowledge in `warnings`. Does NOT
                    clear validation-class failures (schema errors, cross-field
                    invariants, downstream schema breaks, or custom-hook
                    rejections) — those require `skipSchemaValidation` — EXCEPT
                    when the org disables 'block publishing on JSON schema
                    errors' (warn mode), where schema, invariant, and
                    schema-break failures become soft and this flag clears them
                    (custom-hook rejections still need `skipSchemaValidation`).
                    On publish endpoints this also force-merges a draft whose
                    base is stale, when you hold the bypass-approval permission.
                  type: boolean
              additionalProperties: false
      responses:
        '200':
          description: Resource created
          content:
            application/json:
              schema:
                type: object
                properties:
                  savedGroup:
                    $ref: '#/components/schemas/SavedGroup'
                  bypassedGates:
                    description: >-
                      Gates that would have blocked this publish but were
                      bypassed by the caller's authority. Present only when at
                      least one gate was bypassed.
                    type: array
                    items:
                      $ref: '#/components/schemas/bypassedGates'
                required:
                  - savedGroup
                additionalProperties: false
      x-codeSamples:
        - lang: cURL
          source: >-
            curl -X POST
            'https://api.growthbook.io/api/v1/saved-groups/abc123/archive' \
              -H 'Authorization: Bearer YOUR_API_KEY'
