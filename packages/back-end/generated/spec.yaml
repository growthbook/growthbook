      summary: Get the organization's environments
      tags:
        - environments
      operationId: listEnvironments
      x-codeSamples:
        - lang: cURL
          source: |
            curl https://api.growthbook.io/api/v1/environments \
              -u secret_abc123DEF456:
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - environments
                    properties:
                      environments:
                        type: array
                        items:
                          $ref: '#/components/schemas/Environment'
    post:
      tags:
        - environments
      summary: Create a new environment
      operationId: postEnvironment
      x-codeSamples:
        - lang: cURL
          source: |
            curl -X POST https://api.growthbook.io/api/v1/environments \
               -d '{"id": "new-env", "description": "My new environment" }' \
              -u secret_abc123DEF456:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: The ID of the new environment
                description:
                  type: string
                  description: The description of the new environment
                toggleOnList:
                  type: bool
                  description: Show toggle on feature list
                defaultState:
                  type: bool
                  description: Default state for new features
                projects:
                  type: array
                  items:
                    type: string
                parent:
                  type: string
                  description: An environment that the new environment should inherit feature rules from. Requires an enterprise license
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - environment
                properties:
                  environment:
                    $ref: '#/components/schemas/Environment'
  '/environments/${id}':
    put:
      parameters:
        - $ref: '#/components/parameters/id'
      tags:
        - environments
      summary: Update an environment
      operationId: putEnvironment
      x-codeSamples:
        - lang: cURL
          source: |
            curl -X PUT https://api.growthbook.io/api/v1/environments/env-id \
               -d '{ "description": "My updated environment" }' \
              -u secret_abc123DEF456:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: The description of the new environment
                toggleOnList:
                  type: boolean
                  description: Show toggle on feature list
                defaultState:
                  type: boolean
                  description: Default state for new features
                projects:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - environment
                properties:
                  environment:
                    $ref: '#/components/schemas/Environment'
    delete:
      summary: Deletes a single environment
      parameters:
        - $ref: '#/components/parameters/id'
      tags:
        - environments
      operationId: deleteEnvironment
      x-codeSamples:
        - lang: cURL
          source: |
            curl -X DELETE https://api.growthbook.io/api/v1/enviromnents/env-id \
              -u secret_abc123DEF456:
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - deletedId
                properties:
                  deletedId:
                    type: string
  /fact-tables:
    get:
      summary: Get all fact tables
      tags:
        - fact-tables
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/datasourceId'
        - $ref: '#/components/parameters/projectId'
      operationId: listFactTables
      x-codeSamples:
        - lang: cURL
          source: |
            curl https://api.growthbook.io/api/v1/fact-tables \
              -u secret_abc123DEF456:
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - factTables
                    properties:
                      factTables:
                        type: array
                        items:
                          $ref: '#/components/schemas/FactTable'
                  - $ref: '#/components/schemas/PaginationFields'
    post:
      parameters: []
      tags:
        - fact-tables
      summary: Create a single fact table
      operationId: postFactTable
      x-codeSamples:
        - lang: cURL
          source: |
            curl -X POST https://api.growthbook.io/api/v1/fact-tables \
              -d '{"name":"Orders", "datasource":"ds_abc123", "userIdTypes":["id"], "sql":"SELECT * FROM orders"}' \
              -u secret_abc123DEF456:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - datasource
                - userIdTypes
                - sql
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Description of the fact table
                owner:
                  $ref: '#/paths/~1saved-groups/post/requestBody/content/application~1json/schema/properties/owner'
                projects:
                  type: array
                  items:
                    type: string
                  description: List of associated project ids
                tags:
                  type: array
                  items:
                    type: string
                  description: List of associated tags
                datasource:
                  type: string
                  description: The datasource id
                userIdTypes:
                  type: array
                  items:
                    type: string
                  description: 'List of identifier columns in this table. For example, "id" or "anonymous_id"'
                sql:
                  type: string
                  description: The SQL query for this fact table
                eventName:
                  type: string
                  description: The event name used in SQL template variables
                managedBy:
                  type: string
                  description: Set this to "api" to disable editing in the GrowthBook UI
                  enum:
                    - ''
                    - api
                    - admin
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - factTable
                properties:
                  factTable:
                    $ref: '#/components/schemas/FactTable'
  '/fact-tables/{id}':
    get:
      parameters:
        - $ref: '#/components/parameters/id'
      tags:
