          schema:
            description: The key of the config
            type: string
        - $ref: '#/components/parameters/skipSchemaValidation'
        - $ref: '#/components/parameters/ignoreWarnings'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                parent:
                  description: >-
                    Change the lineage parent (the `key` of the config to
                    inherit from). Set to an empty string to detach from the
                    parent and make this a root config.
                  type: string
                extends:
                  description: >-
                    Replace the composition bases (mixins) layered on top of
                    `parent`, in precedence order (later overrides earlier; all
                    override `parent`; own keys win last). Send the complete
                    set; an empty array clears all mixins. Set inheritance here,
                    never via a `@config:` entry in `value`.
                  type: array
                  items:
                    type: string
                value:
                  description: >-
                    This config's base value as a JSON object.
                    Per-environment/project variants are expressed via
                    `scopedOverrides`.
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                scopedOverrides:
                  description: >-
                    Replace the ordered, first-match-wins
                    environment/project-scoped variant selection. Each entry
                    points at a flavor config (a child config, by `key`) whose
                    value is deep-merged onto this config's resolved value when
                    the (environment, project) scope matches. Send the complete
                    list; an empty array clears all overrides; omit to leave
                    unchanged. Entries must reference existing configs, may not
                    reference this config itself, and may not be unreachable.
                  type: array
                  items:
                    type: object
                    properties:
                      config:
                        description: >-
                          The `key` of the flavor config (a child config) whose
                          value patches this config when the scope matches.
                        type: string
                      environments:
                        description: >-
                          Environment ids this entry applies to. Empty/omitted =
                          any environment.
                        type: array
                        items:
                          type: string
                      projects:
                        description: >-
                          Project ids this entry applies to. Empty/omitted = any
                          project.
                        type: array
                        items:
                          type: string
                    required:
                      - config
                    additionalProperties: false
                description:
                  type: string
                  maxLength: 10000
                project:
                  type: string
                owner:
                  description: >-
                    The userId or email address of the owner. If an email
                    address is provided, it will be used to look up the userId
                    of the matching organization member. If an ID is provided,
                    it will be validated as existing in the organization.
                  type: string
                schema:
                  $ref: '#/components/schemas/ConfigSchemaSource'
                source:
                  description: >-
                    Optional identifier of the consuming codebase/service. When
                    a `typescript` or `protobuf` schema is supplied, its
                    named-type structure is captured under this source for
                    reproduction on export.
                  type: string
                extensible:
                  type: boolean
                experimentGuard:
                  description: >-
                    Enable or disable the experiment guard on this config.
                    Turning it OFF requires the `bypassApprovalChecks`
                    permission.
                  type: boolean
                invariants:
                  description: >-
                    Replace the config's cross-field validation rules. Each
                    rule's expression is a mongo condition (mongrule). Send the
                    complete set; an empty array clears all rules. Omit to leave
                    them unchanged.
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        maxLength: 128
                      rule:
                        description: >-
                          The rule expression, as a mongo condition (mongrule) —
                          the same condition syntax as feature targeting,
                          extended with `{ "$ref": "otherField" }` to compare
                          against another field, e.g. `{ "min_replicas": {
                          "$lte": { "$ref": "max_replicas" } } }`.
                        type: object
                        propertyNames:
                          type: string
                        additionalProperties: {}
                      message:
                        description: >-
                          Shown to editors when the rule is violated. Optional —
                          defaults to a generic message naming the rule.
                        type: string
                        maxLength: 10000
                    required:
                      - name
                      - rule
                    additionalProperties: false
                bypassApproval:
                  description: >-
                    Set to true to skip the approval flow when the org requires
                    approvals for this config's project. Requires the
                    `bypassApprovalChecks` permission (or the org-level REST
                    bypass setting). When approvals aren't required, this flag
                    has no effect.
                  type: boolean
                ignoreWarnings:
                  description: >-
                    Acknowledge and proceed past ACKNOWLEDGE-class warnings: a
                    value served to a running experiment, a locked dependent,
                    and dependents dropped by an archive. A blocked request
                    lists what this would acknowledge in `warnings`. Does NOT
                    clear validation-class failures (schema errors, cross-field
                    invariants, downstream schema breaks, or custom-hook
                    rejections) — those require `skipSchemaValidation` — EXCEPT
                    when the org disables 'block publishing on JSON schema
                    errors' (warn mode), where schema, invariant, and
                    schema-break failures become soft and this flag clears them
                    (custom-hook rejections still need `skipSchemaValidation`).
                    On publish endpoints this also force-merges a draft whose
                    base is stale, when you hold the bypass-approval permission.
                  type: boolean
                skipSchemaValidation:
                  description: >-
                    Force past schema-validation failures: JSON-schema
                    validation of the value(s) written, cross-field invariants,
                    and downstream schema breaks (a change that makes a
                    dependent config or config-backed feature value violate its
                    schema). Does NOT clear a custom validation-hook rejection —
                    use `skipHooks` for that. Only honored for callers with
                    org-wide bypass authority (the `bypassApprovalChecks`
                    permission on all projects); ignored otherwise. Validation
                    is enforced by default.
                  type: boolean
                skipHooks:
                  description: >-
