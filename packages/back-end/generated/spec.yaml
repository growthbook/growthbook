                            enum:
                              - ''
                              - api
                              - admin
                        required:
                          - name
                          - datasource
                          - userIdTypes
                          - sql
                        additionalProperties: false
                    required:
                      - id
                      - data
                    additionalProperties: false
                factTableFilters:
                  type: array
