        - datasource
        - userIdTypes
        - sql
        - managedBy
        - dateCreated
        - dateUpdated
      additionalProperties: false
    FactTableColumn:
      type: object
      properties:
        column:
          description: The actual column name in the database/SQL query
          type: string
        datatype:
          type: string
          enum:
            - number
            - string
            - date
            - boolean
            - json
            - other
            - ''
        numberFormat:
          type: string
          enum:
            - ''
            - currency
            - time:seconds
            - memory:bytes
            - memory:kilobytes
        jsonFields:
          description: For JSON columns, defines the structure of nested fields
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: object
            properties:
              datatype:
                type: string
                enum:
                  - number
                  - string
                  - date
                  - boolean
                  - json
                  - other
                  - ''
            additionalProperties: false
        name:
          description: >-
            Display name for the column (can be different from the actual column
            name)
          type: string
        description:
          type: string
        alwaysInlineFilter:
          default: false
          description: >-
            Whether this column should always be included as an inline filter in
            queries
          type: boolean
        deleted:
          default: false
          type: boolean
        isAutoSliceColumn:
          default: false
          description: >-
            Whether this column can be used for auto slice analysis. This is an
            enterprise feature.
          type: boolean
        autoSlices:
          description: Specific slices to automatically analyze for this column.
          type: array
          items:
            type: string
        lockedAutoSlices:
          description: >-
            Locked slices that are protected from automatic updates. These will
            always be included in the slice levels even if they're not in the
            top values query results.
          type: array
          items:
            type: string
        dateCreated:
          readOnly: true
          format: date-time
          type: string
        dateUpdated:
          readOnly: true
          format: date-time
          type: string
      required:
        - column
        - datatype
      additionalProperties: false
