                            - type: boolean
                            - type: 'null'
                        environments:
                          anyOf:
                            - type: array
                              items:
                                type: string
                            - type: 'null'
                        enabled:
                          anyOf:
                            - type: boolean
                            - type: 'null'
                      required:
                        - ruleId
                      additionalProperties: false
                  required:
                    - targetType
                    - targetId
                    - patch
                  additionalProperties: false
            required:
