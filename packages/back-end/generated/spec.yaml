                type:
                  type: string
                  enum:
                    - none
                    - absolute
                    - percentile
                value:
                  description: >-
                    When type is absolute, this is the absolute value. When type
                    is percentile, this is the percentile value (from 0.0 to
                    1.0).
                  type: number
                ignoreZeros:
                  description: >-
                    If true and capping is `percentile`, zeros will be ignored
                    when calculating the percentile.
