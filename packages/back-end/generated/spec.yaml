                    userAggregation:
                      type: string
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
                          property:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                        required:
                          - property
                          - operator
                          - value
                        additionalProperties: false
                  required:
                    - eventName
                    - userAggregation
                  additionalProperties: false
              required:
                - datasourceId
                - name
                - type
              additionalProperties: false
