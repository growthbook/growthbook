                        to the metric
                      type: boolean
                    days:
                      description: >-
                        Number of pre-exposure days to use for the regression
                        adjustment
                      type: number
                  required:
                    - override
                  additionalProperties: false
                riskThresholdSuccess:
                  deprecated: true
                  description: >-
