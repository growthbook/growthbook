          type: string
        description:
          type: string
        value:
          type: string
        managedBy:
          description: >-
            Where this fact table filter must be managed from. If not set (empty
            string), it can be managed from anywhere.
          type: string
          enum:
            - ''
            - api
        dateCreated:
          format: date-time
          type: string
        dateUpdated:
          format: date-time
          type: string
      required:
        - id
        - name
        - description
