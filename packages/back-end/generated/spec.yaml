                              - type: 'null'
                          monitoringMode:
                            type: string
                            enum:
                              - auto
                              - manual
                          autoUpdate:
                            type: boolean
                          srmAction:
                            type: string
                            enum:
                              - rollback
                              - hold
                              - warn
                          noTrafficAction:
                            type: string
                            enum:
                              - rollback
                              - hold
                              - warn
                          noTrafficGracePeriodHours:
                            description: >-
                              How long to wait for traffic before applying
                              `noTrafficAction`. Defaults to 24 hours when null
                              or not set.
                            anyOf:
                              - type: number
                                exclusiveMinimum: 0
                              - type: 'null'
                          multipleExposureAction:
                            type: string
                            enum:
                              - rollback
                              - hold
                              - warn
                        required:
                          - datasourceId
                          - exposureQueryId
                          - guardrailMetricIds
                        additionalProperties: false
                      - type: 'null'
                  experimentHealthAction:
                    type: string
                    enum:
                      - rollback
                      - hold
                      - warn
                  currentStepEnteredAt:
                    anyOf:
                      - type: string
                        format: date-time
                      - type: 'null'
                  stepApproval:
                    description: >-
                      Approval record for the current step. Valid only while
                      `stepApproval.stepIndex === currentStepIndex`.
                    anyOf:
                      - type: object
                        properties:
                          stepIndex:
                            description: Index of the step that was approved.
                            type: integer
                          approvedAt:
                            description: When the approval was granted.
                            type: string
                            format: date-time
                          approvedBy:
                            description: User ID of the approver.
                            type: string
                          context:
                            description: Surface through which the approval was granted.
                            type: string
                            enum:
                              - ui
                              - api
                        required:
                          - stepIndex
                          - approvedAt
                          - approvedBy
                          - context
                        additionalProperties: false
                      - type: 'null'
                  awaitingApproval:
                    description: >-
