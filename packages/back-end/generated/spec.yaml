                  additionalProperties: {}
              required:
                - type
                - value
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  const: typescript
                value:
                  description: TypeScript source — an interface or object type.
                  type: string
              required:
                - type
                - value
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  const: protobuf
                value:
                  description: Protobuf (proto3) source — a `message` definition.
                  type: string
              required:
                - type
                - value
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  const: python
                value:
                  description: Python source — a Pydantic `BaseModel` class.
                  type: string
              required:
                - type
                - value
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  const: go
                value:
                  description: Go source — a `struct` definition.
                  type: string
              required:
                - type
                - value
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  const: rust
                value:
