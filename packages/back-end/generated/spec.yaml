                            description: When the next automatic snapshot query will run
                            anyOf:
                              - type: string
                                format: date-time
                              - type: 'null'
                          currentStepMonitored:
                            description: >-
                              Whether the step at currentStepIndex has
                              monitoring enabled
                            type: boolean
                        required:
                          - monitoringMode
                          - autoUpdate
                          - effectiveAutoUpdate
                          - currentStepMonitored
                        additionalProperties: false
