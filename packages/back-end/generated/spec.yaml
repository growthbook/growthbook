      $skipValidatorGeneration: true
      parameters: []
      tags:
        - Dashboards
      summary: Get all dashboards
      operationId: listDashboards
      x-codeSamples:
        - lang: cURL
          source: 'curl -X GET https://api.growthbook.io/api/v1/dashboards -u secret_abc123DEF456'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - dashboards
                properties:
                  dashboards:
                    $schema: 'https://json-schema.org/draft/2020-12/schema'
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        uid:
                          type: string
                        organization:
                          type: string
                        experimentId:
                          type: string
                        isDefault:
                          type: boolean
                        isDeleted:
                          type: boolean
                        userId:
                          type: string
                        editLevel:
                          type: string
                          enum:
                            - published
                            - private
                        shareLevel:
                          type: string
                          enum:
                            - published
                            - private
                        enableAutoUpdates:
                          type: boolean
                        updateSchedule:
                          anyOf:
                            - type: object
                              properties:
                                type:
                                  type: string
                                  const: stale
                                hours:
                                  type: number
                              required:
                                - type
                                - hours
                              additionalProperties: false
                            - type: object
                              properties:
                                type:
                                  type: string
                                  const: cron
                                cron:
                                  type: string
                              required:
                                - type
                                - cron
                              additionalProperties: false
                        title:
                          type: string
                        projects:
                          type: array
                          items:
                            type: string
                        nextUpdate:
                          type: string
                          format: date-time
                          pattern: '^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$'
                        lastUpdated:
