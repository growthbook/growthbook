            'https://api.growthbook.io/api/v2/features/{id}/revisions/{version}/rebase'
            \
              -H 'Authorization: Bearer YOUR_API_KEY'
  /v2/features/{id}/revisions/{version}/publish:
    post:
      operationId: postFeatureRevisionPublishV2
      summary: Publish a draft revision
      description: >-
        Immediately publishes a draft revision, making it the live version of
        the feature. Any pending ramp actions (`pendingRamp` on rules) are
        executed atomically — ramp schedules are created or detached as queued.
      tags:
        - feature-revisions-v2
      parameters:
        - name: id
          in: path
          required: true
          description: ''
          schema:
            type: string
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/skipSchemaValidation'
        - $ref: '#/components/parameters/ignoreWarnings'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                bypassApproval:
                  description: >-
                    Has no effect and is accepted only for backwards
                    compatibility. Callers with the `bypassApprovalChecks`
                    permission (or under the org-level REST bypass setting)
                    bypass approval requirements automatically; all other
                    callers must have the revision approved before publishing.
                  type: boolean
                ignoreWarnings:
                  description: >-
                    Acknowledge and proceed past ACKNOWLEDGE-class warnings: a
                    value served to a running experiment, a locked dependent,
                    and dependents dropped by an archive. A blocked request
                    lists what this would acknowledge in `warnings`. Does NOT
                    clear validation-class failures (schema errors, cross-field
                    invariants, downstream schema breaks, or custom-hook
                    rejections) — those require `skipSchemaValidation` — EXCEPT
                    when the org disables 'block publishing on JSON schema
                    errors' (warn mode), where schema, invariant, and
                    schema-break failures become soft and this flag clears them
                    (custom-hook rejections still need `skipSchemaValidation`).
                    On publish endpoints this also force-merges a draft whose
                    base is stale, when you hold the bypass-approval permission.
                  type: boolean
                skipSchemaValidation:
                  description: >-
                    Force past schema-validation failures: JSON-schema
                    validation of the value(s) written, cross-field invariants,
                    and downstream schema breaks (a change that makes a
                    dependent config or config-backed feature value violate its
                    schema). Does NOT clear a custom validation-hook rejection —
                    use `skipHooks` for that. Only honored for callers with
                    org-wide bypass authority (the `bypassApprovalChecks`
                    permission on all projects); ignored otherwise. Validation
                    is enforced by default.
                  type: boolean
                skipHooks:
                  description: >-
                    Force past a custom validation hook that rejected the change
                    (a hook that threw). Separate from `skipSchemaValidation` —
                    a hook failure is not a schema error. Only honored for
                    callers with org-wide bypass authority (the
                    `bypassApprovalChecks` permission on all projects); ignored
                    otherwise.
                  type: boolean
              additionalProperties: false
      responses:
        '200':
          description: Resource created
          content:
            application/json:
              schema:
                type: object
                properties:
                  revision:
                    $ref: '#/components/schemas/FeatureRevisionV2'
                  bypassedGates:
                    description: >-
                      Gates that would have blocked this publish but were
                      bypassed by the caller's authority. Present only when at
                      least one gate was bypassed.
                    type: array
                    items:
                      $ref: '#/components/schemas/bypassedGates'
                required:
                  - revision
                additionalProperties: false
