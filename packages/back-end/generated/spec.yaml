        - pValueThreshold
        - regressionAdjustmentEnabled
        - regressionAdjustmentDays
        - sequentialTestingEnabled
        - sequentialTestingTuningParameter
        - attributionModel
        - targetMDE
        - delayHours
        - windowType
        - windowHours
        - winRisk
        - loseRisk
        - secureAttributeSalt
        - killswitchConfirmation
        - requireReviews
        - featureKeyExample
        - featureRegexValidator
        - banditScheduleValue
        - banditScheduleUnit
        - banditBurnInValue
        - banditBurnInUnit
        - experimentMinLengthDays
      additionalProperties: false
    InformationSchemaTable:
      type: object
      properties:
        id:
          type: string
        datasourceId:
          type: string
        informationSchemaId:
          type: string
        tableName:
          type: string
        tableSchema:
          type: string
        databaseName:
          type: string
        columns:
          type: array
          items:
            type: object
            properties:
              columnName:
                type: string
              dataType:
                type: string
            required:
              - columnName
              - dataType
            additionalProperties: false
        refreshMS:
          type: number
        dateCreated:
          format: date-time
          type: string
        dateUpdated:
          format: date-time
          type: string
      required:
        - id
        - datasourceId
        - informationSchemaId
        - tableName
        - tableSchema
        - databaseName
        - columns
        - refreshMS
        - dateCreated
        - dateUpdated
      additionalProperties: false
    RampSchedule:
      type: object
      properties:
        id:
          description: Unique identifier (rs_ prefix)
          type: string
        dateCreated:
          type: string
          format: date-time
        dateUpdated:
          type: string
          format: date-time
        name:
          type: string
        entityType:
          type: string
          enum:
            - feature
        entityId:
          type: string
        targets:
          description: Controlled entity references
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              entityType:
                type: string
                enum:
                  - feature
              entityId:
                type: string
              ruleId:
                anyOf:
                  - type: string
                  - type: 'null'
              environment:
                deprecated: true
                description: >-
                  Legacy disambiguator used alongside `ruleId` for pre-v2 ramps.
                  May be null on newer targets.
                anyOf:
                  - type: string
                  - type: 'null'
              status:
                type: string
                enum:
                  - pending-join
                  - active
              activatingRevisionVersion:
                description: >-
                  Feature revision version that activates this ramp; cleared
                  once published
                anyOf:
                  - type: integer
                  - type: 'null'
            required:
              - id
              - entityType
              - entityId
              - status
            additionalProperties: false
        startActions:
          description: >-
            Actions that restore controlled rules to their pre-ramp state.
            Applied when rolling back or jumping to start.
          type: array
          items:
            type: object
            properties:
              targetType:
                type: string
                const: feature-rule
              targetId:
                type: string
              patch:
                type: object
                properties:
                  ruleId:
                    type: string
                  coverage:
                    description: >-
                      Traffic fraction (0–1). For monitored steps the rollout
                      rule is promoted to an experiment: treatment = [0,
                      coverage), control = [0.5, 0.5+coverage). Both arms are
                      equal-sized and non-adjacent, so a step-up only adds new
                      users to each arm — no existing user changes group. The
                      REST API enforces coverage ≤ 0.5 on monitored steps so
                      control end never exceeds 1.0. The SDK uses explicit hash
                      ranges on bucketingV2 clients to keep bucketing stable
                      across monitored/unmonitored transitions.
                    anyOf:
                      - type: number
                        minimum: 0
                        maximum: 1
                      - type: 'null'
                  condition:
                    anyOf:
                      - type: string
                      - type: 'null'
                  savedGroups:
                    anyOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            match:
                              type: string
                              enum:
                                - all
                                - none
                                - any
                            ids:
                              type: array
                              items:
                                type: string
                          required:
                            - match
                            - ids
                          additionalProperties: false
                      - type: 'null'
                  prerequisites:
                    anyOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            condition:
                              type: string
                          required:
                            - id
                            - condition
                          additionalProperties: false
                      - type: 'null'
                  allEnvironments:
                    anyOf:
                      - type: boolean
                      - type: 'null'
                  environments:
                    anyOf:
                      - type: array
                        items:
                          type: string
                      - type: 'null'
                  force:
                    description: Force value (any JSON type)
                  enabled:
                    anyOf:
                      - type: boolean
                      - type: 'null'
                required:
                  - ruleId
                additionalProperties: false
            required:
              - targetType
              - targetId
              - patch
            additionalProperties: false
        steps:
          description: Ordered ramp steps
          type: array
          items:
            type: object
            properties:
              interval:
                description: >-
                  Hold duration in seconds before this step's gates are
                  evaluated. null = no time gate (advance as soon as
                  holdConditions clear).
                anyOf:
                  - type: number
                    exclusiveMinimum: 0
                  - type: 'null'
              approvalNotes:
                anyOf:
                  - type: string
                  - type: 'null'
              monitored:
                description: >-
                  When true, this step runs A/B traffic analysis while active.
                  Treatment = [0, coverage), control = [0.5, 0.5+coverage). Arms
                  are equal-sized and non-adjacent: step-ups only add users,
                  never reassign existing ones. The UI caps monitored-step
                  coverage at 0.5 so control end never exceeds 1.0. The SDK uses
                  explicit hash ranges on the experiment rule to prevent
                  bucketing shifts across monitored/unmonitored transitions.
                type: boolean
              holdConditions:
                type: object
                properties:
                  minSampleSize:
                    type: integer
                    exclusiveMinimum: 0
                  requiresApproval:
                    type: boolean
                additionalProperties: false
              actions:
                type: array
                items:
                  type: object
                  properties:
                    targetType:
                      type: string
                      const: feature-rule
                    targetId:
                      type: string
                    patch:
                      type: object
                      properties:
                        ruleId:
                          type: string
                        coverage:
                          description: >-
                            Traffic fraction (0–1). For monitored steps the
                            rollout rule is promoted to an experiment: treatment
                            = [0, coverage), control = [0.5, 0.5+coverage). Both
                            arms are equal-sized and non-adjacent, so a step-up
                            only adds new users to each arm — no existing user
                            changes group. The REST API enforces coverage ≤ 0.5
                            on monitored steps so control end never exceeds 1.0.
                            The SDK uses explicit hash ranges on bucketingV2
                            clients to keep bucketing stable across
                            monitored/unmonitored transitions.
                          anyOf:
                            - type: number
                              minimum: 0
                              maximum: 1
                            - type: 'null'
                        condition:
                          anyOf:
                            - type: string
                            - type: 'null'
                        savedGroups:
                          anyOf:
                            - type: array
                              items:
                                type: object
                                properties:
                                  match:
                                    type: string
                                    enum:
                                      - all
                                      - none
                                      - any
                                  ids:
                                    type: array
                                    items:
                                      type: string
                                required:
                                  - match
                                  - ids
                                additionalProperties: false
                            - type: 'null'
                        prerequisites:
                          anyOf:
                            - type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  condition:
                                    type: string
                                required:
                                  - id
                                  - condition
                                additionalProperties: false
                            - type: 'null'
                        allEnvironments:
                          anyOf:
                            - type: boolean
                            - type: 'null'
                        environments:
                          anyOf:
                            - type: array
                              items:
                                type: string
                            - type: 'null'
                        force:
                          description: Force value (any JSON type)
                        enabled:
                          anyOf:
                            - type: boolean
                            - type: 'null'
                      required:
                        - ruleId
                      additionalProperties: false
                  required:
                    - targetType
                    - targetId
                    - patch
                  additionalProperties: false
            required:
              - interval
              - actions
            additionalProperties: false
        endActions:
          description: >-
            Actions applied on top of all step patches when the ramp completes.
            Represents the final desired rule state.
          type: array
          items:
            type: object
            properties:
              targetType:
                type: string
                const: feature-rule
              targetId:
                type: string
              patch:
                type: object
                properties:
                  ruleId:
                    type: string
                  coverage:
                    description: >-
                      Traffic fraction (0–1). For monitored steps the rollout
                      rule is promoted to an experiment: treatment = [0,
                      coverage), control = [0.5, 0.5+coverage). Both arms are
                      equal-sized and non-adjacent, so a step-up only adds new
                      users to each arm — no existing user changes group. The
                      REST API enforces coverage ≤ 0.5 on monitored steps so
                      control end never exceeds 1.0. The SDK uses explicit hash
                      ranges on bucketingV2 clients to keep bucketing stable
                      across monitored/unmonitored transitions.
                    anyOf:
                      - type: number
                        minimum: 0
                        maximum: 1
                      - type: 'null'
                  condition:
                    anyOf:
                      - type: string
                      - type: 'null'
                  savedGroups:
                    anyOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            match:
                              type: string
                              enum:
                                - all
                                - none
                                - any
                            ids:
                              type: array
                              items:
                                type: string
                          required:
                            - match
                            - ids
                          additionalProperties: false
                      - type: 'null'
                  prerequisites:
                    anyOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            condition:
                              type: string
                          required:
                            - id
                            - condition
                          additionalProperties: false
                      - type: 'null'
                  allEnvironments:
                    anyOf:
                      - type: boolean
                      - type: 'null'
                  environments:
                    anyOf:
                      - type: array
                        items:
                          type: string
                      - type: 'null'
                  force:
                    description: Force value (any JSON type)
                  enabled:
                    anyOf:
                      - type: boolean
                      - type: 'null'
                required:
                  - ruleId
                additionalProperties: false
            required:
              - targetType
              - targetId
              - patch
            additionalProperties: false
        startDate:
          description: >-
            When the ramp fires. Absent/null means immediately on publish; set
            to a future datetime to delay start and keep the rule disabled until
            that time.
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        cutoffDate:
          description: >-
            Rule-level kill date. When reached, the ramp is completed and the
            rule is disabled (enabled=false). Use for time-boxed rules that must
            stop serving on a fixed date regardless of ramp progress. Set to
            null to clear.
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        requiresStartApproval:
          description: >-
            When true, the ramp holds at step -1 with its rule disabled (zero
            traffic) until a human approves the start via /actions/approve-step.
            Composes with startDate ('hold until approved, then arm for that
            date').
          type: boolean
        startApprovedAt:
          description: >-
            When the current launch's start was approved. Cleared on every
            return to step -1 (publish, rollback), re-arming the approval gate.
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        status:
          type: string
          enum:
            - pending
            - ready
            - running
            - paused
            - completed
            - rolled-back
        currentStepIndex:
          description: Index of current step; -1 = not yet started
          type: integer
          minimum: -1
        startedAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        phaseStartedAt:
          description: >-
            Anchor for cumulative interval timing; resets after each approval
            gate is satisfied
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        pausedAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        nextStepAt:
          description: >-
            When the current step's time gate elapses; null for steps with no
            interval (pure approval gates) and terminal states
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        nextProcessAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        elapsedMs:
          description: Milliseconds since startedAt (computed at response time, not stored)
          anyOf:
            - type: integer
            - type: 'null'
        lockdownConfig:
          type: object
          properties:
            mode:
              type: string
              enum:
                - none
                - locked
          required:
            - mode
          additionalProperties: false
        monitoringConfig:
          anyOf:
            - type: object
              properties:
                datasourceId:
                  type: string
                exposureQueryId:
                  type: string
                guardrailMetricIds:
                  minItems: 1
                  type: array
                  items:
                    type: string
                signalMetricIds:
                  type: array
                  items:
                    type: string
                updateScheduleMinutes:
                  anyOf:
                    - type: number
                      minimum: 10
                    - type: 'null'
                monitoringMode:
                  type: string
                  enum:
                    - auto
                    - manual
                autoUpdate:
                  type: boolean
                srmAction:
                  type: string
                  enum:
                    - rollback
                    - hold
                    - warn
                noTrafficAction:
                  type: string
                  enum:
                    - rollback
                    - hold
                    - warn
                noTrafficGracePeriodHours:
                  description: >-
                    How long to wait for traffic before applying
                    `noTrafficAction`. Defaults to 24 hours when null or not
                    set.
                  anyOf:
                    - type: number
                      exclusiveMinimum: 0
                    - type: 'null'
                multipleExposureAction:
                  type: string
                  enum:
                    - rollback
                    - hold
                    - warn
              required:
                - datasourceId
                - exposureQueryId
                - guardrailMetricIds
              additionalProperties: false
            - type: 'null'
        experimentHealthAction:
          type: string
          enum:
            - rollback
            - hold
            - warn
        currentStepEnteredAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        stepApproval:
          description: >-
            Approval record for the current step. Valid only while
            `stepApproval.stepIndex === currentStepIndex`.
          anyOf:
            - type: object
              properties:
                stepIndex:
                  description: Index of the step that was approved.
                  type: integer
                approvedAt:
                  description: When the approval was granted.
                  type: string
                  format: date-time
                approvedBy:
                  description: User ID of the approver.
                  type: string
                context:
                  description: Surface through which the approval was granted.
                  type: string
                  enum:
                    - ui
                    - api
              required:
                - stepIndex
                - approvedAt
                - approvedBy
                - context
              additionalProperties: false
            - type: 'null'
        awaitingApproval:
          description: >-
            Computed at read time: whether a human approval is the gate blocking
            the schedule right now — either the start-approval gate
            (`requiresStartApproval` before step 0) or the current step's
            `holdConditions.requiresApproval` once its time hold (if any) has
            elapsed. Paused schedules report `false` (the pause is the blocking
            gate). For monitored steps the approve-step endpoint may still
            reject an approval until analysis-based gates clear.
          type: boolean
        monitoringStartDate:
          description: >-
            When the monitored section most recently started (first monitored
            step entered). Used for no-traffic grace period gating.
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        lastRollbackAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        lastRollbackReason:
          anyOf:
            - type: string
            - type: 'null'
        monitoringStatus:
          description: Read-only monitoring status. Present when monitoringConfig is set.
          anyOf:
            - type: object
              properties:
                safeRolloutId:
                  anyOf:
                    - type: string
                    - type: 'null'
                monitoringMode:
                  description: >-
                    User-selected monitoring mode. `auto` schedules snapshots
                    automatically; `manual` requires clicking Update.
                  type: string
                  enum:
                    - auto
                    - manual
                autoUpdate:
                  description: >-
                    Legacy alias for auto-update behavior. Prefer
                    `monitoringMode` (`auto` means true, `manual` means false).
                  type: boolean
                effectiveAutoUpdate:
                  description: >-
                    Computed runtime flag. True only when monitoring mode is
                    auto and schedule state allows automatic snapshot
                    scheduling.
                  type: boolean
                blockedReason:
                  description: >-
                    When `effectiveAutoUpdate` is false, this describes the
                    computed reason auto-updates are currently blocked.
                  anyOf:
                    - type: string
                    - type: 'null'
                nextSnapshotAt:
                  description: When the next automatic snapshot query will run
                  anyOf:
                    - type: string
                      format: date-time
                    - type: 'null'
                currentStepMonitored:
                  description: Whether the step at currentStepIndex has monitoring enabled
                  type: boolean
              required:
                - monitoringMode
                - autoUpdate
                - effectiveAutoUpdate
                - currentStepMonitored
              additionalProperties: false
            - type: 'null'
      required:
        - id
        - dateCreated
        - dateUpdated
        - name
        - entityType
        - entityId
        - targets
        - steps
        - status
        - currentStepIndex
        - nextStepAt
        - awaitingApproval
      additionalProperties: false
    Report:
      type: object
      properties:
        id:
          type: string
        dateCreated:
          type: string
        dateUpdated:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          description: >-
            Report type. `experiment-snapshot` is the current shape and is what
            `POST /reports` always creates. `experiment` is a deprecated legacy
            shape that is read-only through this API; it cannot be created or
            refreshed and is preserved only for backward compatibility when
            reading reports created before the new shape existed.
          type: string
          enum:
            - experiment-snapshot
            - experiment
        status:
          description: >-
            UI lifecycle marker. Note: this does NOT control public shareability
            — see `shareLevel` for visibility controls.
          type: string
          enum:
            - published
            - private
        shareLevel:
          description: >-
            Visibility of the report. `private` (default) restricts access to
            the API caller and admins. `organization` makes it visible to all
            members of the organization in the GrowthBook UI. `public`
            additionally exposes it via a shareable URL (returned as
            `shareUrl`); anyone with the URL can view it without authentication.
          type: string
          enum:
            - public
            - organization
            - private
        shareUrl:
          description: >-
            Public URL for viewing the report. Only present when `shareLevel` is
            `public`.
          type: string
        experimentId:
          type: string
        snapshotId:
          description: Snapshot ID (experiment-snapshot type only)
          type: string
        snapshotStatus:
          description: Status of the latest snapshot (poll this after refresh)
          type: string
          enum:
            - running
            - success
            - error
        snapshotError:
          description: Error message if snapshot failed
          type: string
        analysisSettings:
          type: object
          properties:
            statsEngine:
              type: string
              enum:
                - bayesian
                - frequentist
            goalMetrics:
              type: array
              items:
                type: string
            secondaryMetrics:
              type: array
              items:
                type: string
            guardrailMetrics:
              type: array
              items:
                type: string
            activationMetric:
              type: string
            metricOverrides:
              description: Per-metric window, risk, and regression-adjustment overrides
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  windowType:
                    type: string
                    enum:
                      - conversion
                      - lookback
                      - ''
                  windowHours:
                    type: number
                  delayHours:
                    type: number
                  winRisk:
                    type: number
                  loseRisk:
                    type: number
                  properPriorOverride:
                    type: boolean
                  properPriorEnabled:
                    type: boolean
                  properPriorMean:
                    type: number
                  properPriorStdDev:
                    type: number
                    exclusiveMinimum: 0
                  regressionAdjustmentOverride:
                    type: boolean
                  regressionAdjustmentEnabled:
                    type: boolean
                  regressionAdjustmentDays:
                    type: number
                required:
                  - id
                additionalProperties: false
            customMetricSlices:
              description: Custom metric slice definitions
              type: array
              items:
                type: object
                properties:
                  slices:
                    type: array
                    items:
                      type: object
                      properties:
                        column:
                          type: string
                        levels:
                          type: array
                          items:
                            type: string
                      required:
                        - column
                        - levels
                      additionalProperties: false
                required:
                  - slices
                additionalProperties: false
            dimension:
              type: string
            differenceType:
              description: >-
                How lifts are expressed in results: `relative` (% change),
                `absolute` (raw difference), or `scaled` (scaled impact)
              type: string
              enum:
                - relative
                - absolute
                - scaled
            dateStarted:
              format: date-time
              type: string
            dateEnded:
              format: date-time
              type: string
            regressionAdjustmentEnabled:
              type: boolean
            sequentialTestingEnabled:
              type: boolean
            sequentialTestingTuningParameter:
              description: Tuning parameter for sequential testing (frequentist only)
              type: number
            attributionModel:
              description: >-
                Metric conversion window attribution model: `firstExposure`,
                `experimentDuration`, or `lookbackOverride`
              type: string
              enum:
                - firstExposure
                - experimentDuration
                - lookbackOverride
            lookbackOverride:
              description: >-
                Lookback window used when `attributionModel` is
                `lookbackOverride`
              anyOf:
                - type: object
                  properties:
                    type:
                      type: string
                      const: date
                    value: {}
                  required:
                    - type
                    - value
                  additionalProperties: false
                - type: object
                  properties:
                    type:
                      type: string
                      const: window
                    value:
                      type: number
                      minimum: 0
                    valueUnit:
                      type: string
                      enum:
                        - minutes
                        - hours
                        - days
                        - weeks
                  required:
                    - type
                    - value
                    - valueUnit
                  additionalProperties: false
            trackingKey:
              description: Tracking key used to identify experiment exposures
              type: string
            exposureQueryId:
              description: Datasource exposure query ID (Assignment Table)
              type: string
            segment:
              description: Segment ID to filter users by
              type: string
            queryFilter:
              description: Raw SQL WHERE clause added to the exposure query
              type: string
            skipPartialData:
              description: >-
                When true, exclude users who have not completed the full
                conversion window
              type: boolean
          additionalProperties: false
        experimentMetadata:
          type: object
          properties:
            type:
              description: Experiment type
              type: string
              enum:
                - standard
                - multi-armed-bandit
                - holdout
            variations:
              description: >-
                Variation metadata with current traffic weights — use to label
                result columns
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  key:
                    type: string
                  weight:
                    description: Traffic weight (0–1)
                    type: number
                required:
                  - id
                  - name
                  - key
                  - weight
                additionalProperties: false
            phases:
              description: Experiment phases
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  dateStarted:
                    type: string
                  dateEnded:
                    type: string
                  coverage:
                    description: Traffic coverage (0–1)
                    type: number
                additionalProperties: false
          additionalProperties: false
        results:
          $ref: '#/components/schemas/ExperimentResults'
      required:
        - id
        - dateCreated
        - dateUpdated
        - title
        - description
        - type
      additionalProperties: false
    Namespace:
      type: object
      properties:
        id:
          description: The unique internal identifier for the namespace (e.g. 'ns-abc123').
          type: string
        displayName:
          description: Human-readable display name.
          type: string
        description:
          type: string
