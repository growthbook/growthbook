        - managedBy
        - dateCreated
        - dateUpdated
      additionalProperties: false
    FactMetric:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        owner:
          description: The userId of the owner (or raw owner name/email for legacy records)
          type: string
        ownerEmail:
          description: >-
            The email address of the owner, when the owner can be resolved to a
            known user.
          type: string
        projects:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        datasource:
          type: string
        metricType:
          type: string
          enum:
            - proportion
            - retention
            - mean
            - quantile
            - ratio
            - dailyParticipation
        numerator:
          type: object
          properties:
            factTableId:
              type: string
            column:
              type: string
            aggregation:
              type: string
              enum:
                - sum
                - max
                - count distinct
            filters:
              deprecated: true
              description: >-
                Array of Fact Table Filter Ids. Deprecated, use rowFilters
                instead.
              type: array
              items:
                type: string
            inlineFilters:
              deprecated: true
              description: >-
                Inline filters to apply to the fact table. Keys are column
                names, values are arrays of values to filter by. Deprecated, use
                rowFilters instead.
              type: object
              propertyNames:
                type: string
              additionalProperties:
                type: array
                items:
                  type: string
            rowFilters:
              description: >-
                Filters to apply to the rows of the fact table before
                aggregation.
              type: array
              items:
                type: object
                properties:
                  operator:
                    type: string
                    enum:
                      - '='
                      - '!='
                      - '>'
                      - <
                      - '>='
                      - <=
                      - in
                      - not_in
                      - is_null
                      - not_null
                      - is_true
                      - is_false
                      - contains
                      - not_contains
                      - starts_with
                      - ends_with
                      - sql_expr
                      - saved_filter
                  values:
                    description: >-
                      Not required for is_null, not_null, is_true, is_false
                      operators.
                    type: array
                    items:
                      type: string
                  column:
                    description: >-
                      Required for all operators except sql_expr and
                      saved_filter.
                    type: string
                required:
                  - operator
                additionalProperties: false
            aggregateFilterColumn:
              description: >-
                Column to use to filter users after aggregation. Either
                '$$count' of rows or the name of a numeric column that will be
                summed by user. Must specify `aggregateFilter` if using this.
                Only can be used with 'retention' and 'proportion' metrics.
              type: string
            aggregateFilter:
              description: >-
                Simple comparison operator and value to apply after aggregation
                (e.g. '= 10' or '>= 1'). Requires `aggregateFilterColumn`.
              type: string
          required:
            - factTableId
            - column
          additionalProperties: false
        denominator:
          type: object
          properties:
            factTableId:
              type: string
            column:
              type: string
            filters:
              deprecated: true
              description: >-
                Array of Fact Table Filter Ids. Deprecated, use rowFilters
                instead.
              type: array
              items:
                type: string
            inlineFilters:
              deprecated: true
              description: >-
                Inline filters to apply to the fact table. Keys are column
                names, values are arrays of values to filter by. Deprecated, use
                rowFilters instead.
              type: object
              propertyNames:
                type: string
              additionalProperties:
                type: array
                items:
                  type: string
            rowFilters:
              description: >-
                Filters to apply to the rows of the fact table before
                aggregation.
              type: array
              items:
                type: object
                properties:
                  operator:
                    type: string
                    enum:
                      - '='
                      - '!='
                      - '>'
                      - <
                      - '>='
                      - <=
                      - in
                      - not_in
                      - is_null
                      - not_null
                      - is_true
                      - is_false
                      - contains
                      - not_contains
                      - starts_with
                      - ends_with
                      - sql_expr
                      - saved_filter
                  values:
                    description: >-
                      Not required for is_null, not_null, is_true, is_false
                      operators.
                    type: array
                    items:
                      type: string
                  column:
                    description: >-
                      Required for all operators except sql_expr and
                      saved_filter.
                    type: string
                required:
                  - operator
                additionalProperties: false
          required:
            - factTableId
            - column
          additionalProperties: false
        inverse:
          description: >-
            Set to true for things like Bounce Rate, where you want the metric
            to decrease
          type: boolean
        quantileSettings:
          description: >-
            Controls the settings for quantile metrics (mandatory if metricType
            is "quantile")
          type: object
          properties:
            type:
              description: >-
                Whether the quantile is over unit aggregations or raw event
                values
              type: string
              enum:
                - event
                - unit
            ignoreZeros:
              description: >-
                If true, zero values will be ignored when calculating the
                quantile
              type: boolean
            quantile:
              description: The quantile value (from 0.001 to 0.999)
              type: number
              minimum: 0.001
              maximum: 0.999
              multipleOf: 0.001
          required:
            - type
            - ignoreZeros
            - quantile
          additionalProperties: false
        cappingSettings:
          description: Controls how outliers are handled
          type: object
          properties:
            type:
              type: string
              enum:
                - none
                - absolute
                - percentile
            value:
              description: >-
                When type is absolute, this is the absolute value. When type is
                percentile, this is the percentile value (from 0.0 to 1.0).
              type: number
            ignoreZeros:
              description: >-
                If true and capping is `percentile`, zeros will be ignored when
                calculating the percentile.
              type: boolean
          required:
            - type
          additionalProperties: false
        windowSettings:
          description: Controls the conversion window for the metric
          type: object
          properties:
            type:
              type: string
              enum:
                - none
                - conversion
                - lookback
            delayValue:
              description: >-
                Wait this long after experiment exposure before counting
                conversions.
              type: number
            delayUnit:
              type: string
              enum:
                - minutes
                - hours
                - days
                - weeks
            windowValue:
              type: number
            windowUnit:
              type: string
              enum:
                - minutes
                - hours
                - days
                - weeks
          required:
            - type
          additionalProperties: false
        priorSettings:
          description: Controls the bayesian prior for the metric
          type: object
          properties:
            override:
              description: >-
                If false, the organization default settings will be used instead
                of the other settings in this object
              type: boolean
            proper:
              description: >-
                If true, the `mean` and `stddev` will be used, otherwise we will
                use an improper flat prior.
              type: boolean
            mean:
              description: >-
                The mean of the prior distribution of relative effects in
                proportion terms (e.g. 0.01 is 1%)
              type: number
            stddev:
              description: >-
                Must be > 0. The standard deviation of the prior distribution of
                relative effects in proportion terms.
              type: number
          required:
            - override
            - proper
            - mean
            - stddev
          additionalProperties: false
        regressionAdjustmentSettings:
          description: Controls the regression adjustment (CUPED) settings for the metric
          type: object
          properties:
            override:
              description: If false, the organization default settings will be used
              type: boolean
            enabled:
              description: >-
                Controls whether or not regresion adjustment is applied to the
                metric
              type: boolean
            days:
              description: Number of pre-exposure days to use for the regression adjustment
              type: number
          required:
            - override
          additionalProperties: false
        riskThresholdSuccess:
          type: number
        riskThresholdDanger:
          type: number
        displayAsPercentage:
          description: >-
            If true and the metric is a ratio metric, variation means will be
            displayed as a percentage
          type: boolean
        minPercentChange:
          type: number
        maxPercentChange:
          type: number
        minSampleSize:
          type: number
        targetMDE:
          type: number
        managedBy:
          description: >-
            Where this fact metric must be managed from. If not set (empty
            string), it can be managed from anywhere.
          type: string
          enum:
            - ''
            - api
            - admin
        dateCreated:
          format: date-time
          type: string
        dateUpdated:
          format: date-time
          type: string
        archived:
          type: boolean
        metricAutoSlices:
          description: >-
            Array of slice column names that will be automatically included in
            metric analysis. This is an enterprise feature.
          type: array
          items:
            type: string
      required:
        - id
        - name
        - description
        - owner
        - projects
        - tags
        - datasource
        - metricType
        - numerator
        - inverse
        - cappingSettings
        - windowSettings
        - priorSettings
        - regressionAdjustmentSettings
        - riskThresholdSuccess
        - riskThresholdDanger
        - minPercentChange
        - maxPercentChange
        - minSampleSize
        - targetMDE
        - managedBy
        - dateCreated
        - dateUpdated
      additionalProperties: false
