        - lang: cURL
          source: |-
            curl -X GET 'https://api.growthbook.io/api/v1/ramp-schedules' \
              -H 'Authorization: Bearer YOUR_API_KEY'
    post:
      operationId: createRampSchedule
      summary: Create a single rampSchedule
      description: >
        Creates a new ramp schedule, optionally attaching it to a published
        feature rule.


        ### Target attachment (optional)


        Provide `featureId`, `ruleId`, and `environment` together to attach the
        schedule

        to a specific rule on creation. The rule must already be live
        (published). Each

        `[ruleId, environment]` pair can only be controlled by one schedule at a
        time.


        When all three are supplied, **`targetId` and `patch.ruleId` are
        auto-injected**

        into every step action and endAction — callers only need to supply the
        patch

        values (`coverage`, `condition`, etc.).


        If omitted, the schedule is created as a free-standing skeleton in
        `pending`

        status. Use `POST /ramp-schedules/{id}/actions/add-target` to attach
        rules later,

        and `POST /ramp-schedules/{id}/actions/start` to start it.


        ### Using templates


        Provide `templateId` to inherit steps and endActions from a saved
        template.

        Explicit `steps` / `endActions` in the request body take precedence over
        the

        template. Template auto-population requires `featureId`, `ruleId`, and

        `environment` to be set (so targetId can be injected).


        Requires an **Enterprise** plan.
      tags:
        - ramp-schedules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                featureId:
                  description: >-
                    Feature that anchors this schedule. Required when
                    ruleId/environment are set.
                  type: string
                ruleId:
                  description: >-
                    Rule to attach as the initial target. Requires featureId and
                    environment.
                  type: string
                environment:
                  description: >-
                    Environment of the target rule. Requires featureId and
                    ruleId.
                  type: string
                steps:
                  description: >
                    Ordered ramp steps. When featureId+ruleId+environment are
                    provided,

                    `targetId` and `patch.ruleId` in actions are auto-injected —
                    only

                    supply the patch fields you want to change.
                  type: array
                  items:
                    type: object
                    properties:
                      trigger:
                        anyOf:
                          - type: object
                            properties:
                              type:
                                type: string
                                const: interval
                              seconds:
                                type: number
                                exclusiveMinimum: 0
                            required:
                              - type
                              - seconds
                            additionalProperties: false
                          - type: object
                            properties:
                              type:
                                type: string
                                const: approval
                            required:
                              - type
                            additionalProperties: false
                          - type: object
                            properties:
                              type:
                                type: string
                                const: scheduled
                              at:
                                type: string
                            required:
                              - type
                              - at
                            additionalProperties: false
                      actions:
                        type: array
                        items:
                          type: object
                          properties:
                            targetType:
                              description: >-
                                Omit when using featureId+ruleId+environment
                                (auto-injected)
                              type: string
                              const: feature-rule
                            targetId:
                              description: >-
                                Auto-injected when featureId+ruleId+environment
                                are provided
                              type: string
                            patch:
                              description: >-
                                Sparse patch — only fields present are applied;
                                absent fields accumulate from previous steps
                              type: object
                              properties:
                                ruleId:
                                  description: >-
                                    Auto-injected when ruleId is provided at the
                                    top level
                                  type: string
                                coverage:
                                  anyOf:
                                    - type: number
                                      minimum: 0
                                      maximum: 1
                                    - type: 'null'
                                condition:
                                  anyOf:
                                    - type: string
                                    - type: 'null'
                                savedGroups:
                                  anyOf:
                                    - type: array
                                      items:
                                        type: object
                                        properties:
                                          match:
                                            type: string
                                            enum:
                                              - all
                                              - none
                                              - any
                                          ids:
                                            type: array
                                            items:
                                              type: string
                                        required:
                                          - match
                                          - ids
                                        additionalProperties: false
                                    - type: 'null'
                                prerequisites:
                                  anyOf:
                                    - type: array
                                      items:
                                        type: object
                                        properties:
                                          id:
                                            type: string
                                          condition:
                                            type: string
                                        required:
                                          - id
                                          - condition
                                        additionalProperties: false
                                    - type: 'null'
                                force:
                                  description: Force value (any JSON type)
                                enabled:
                                  anyOf:
                                    - type: boolean
                                    - type: 'null'
                              additionalProperties: false
                          required:
                            - patch
                          additionalProperties: false
                      approvalNotes:
                        anyOf:
                          - type: string
                          - type: 'null'
                    required:
                      - trigger
                    additionalProperties: false
                endActions:
                  description: >-
                    Actions applied when the ramp completes. targetId and
                    patch.ruleId are auto-injected when
                    featureId+ruleId+environment are provided.
                  type: array
                  items:
                    type: object
                    properties:
                      targetType:
                        description: >-
                          Omit when using featureId+ruleId+environment
                          (auto-injected)
                        type: string
                        const: feature-rule
                      targetId:
                        description: >-
                          Auto-injected when featureId+ruleId+environment are
                          provided
                        type: string
                      patch:
                        description: >-
                          Sparse patch — only fields present are applied; absent
                          fields accumulate from previous steps
                        type: object
                        properties:
                          ruleId:
                            description: >-
                              Auto-injected when ruleId is provided at the top
                              level
                            type: string
                          coverage:
                            anyOf:
                              - type: number
                                minimum: 0
                                maximum: 1
                              - type: 'null'
                          condition:
                            anyOf:
                              - type: string
                              - type: 'null'
                          savedGroups:
                            anyOf:
                              - type: array
                                items:
                                  type: object
                                  properties:
                                    match:
                                      type: string
                                      enum:
                                        - all
                                        - none
                                        - any
                                    ids:
                                      type: array
                                      items:
                                        type: string
                                  required:
                                    - match
                                    - ids
                                  additionalProperties: false
                              - type: 'null'
                          prerequisites:
                            anyOf:
                              - type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    condition:
                                      type: string
                                  required:
                                    - id
                                    - condition
                                  additionalProperties: false
                              - type: 'null'
                          force:
                            description: Force value (any JSON type)
                          enabled:
                            anyOf:
                              - type: boolean
                              - type: 'null'
                        additionalProperties: false
                    required:
                      - patch
                    additionalProperties: false
                startDate:
                  description: When to start. Absent/null = immediately on start action.
                  anyOf:
                    - type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    - type: 'null'
                endCondition:
                  description: Optional hard deadline
                  type: object
                  properties:
                    trigger:
                      type: object
                      properties:
                        type:
                          type: string
                          const: scheduled
                        at:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      required:
                        - type
                        - at
                      additionalProperties: false
                  additionalProperties: false
                templateId:
                  description: >-
                    Load steps and endActions from a saved template
                    (featureId+ruleId+environment must also be set for
                    auto-injection)
                  type: string
              required:
                - name
              additionalProperties: false
