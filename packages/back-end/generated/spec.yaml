  /v1/experiments/{id}/stop:
    post:
      operationId: postExperimentStop
      summary: Stop an experiment
      tags:
        - experiments
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  description: The experiment conclusion status.
                  type: string
                  enum:
                    - dnf
                    - won
                    - lost
                    - inconclusive
                enableTemporaryRollout:
                  description: >-
                    If true, include this stopped experiment in SDK payload and
                    force the release variation (`releasedVariationId`) to all
                    traffic.
                  type: boolean
                releasedVariationId:
                  description: >-
                    Required if enableTemporaryRollout is true. Variation ID
                    (e.g. var_abc123) to release to 100% of traffic eligible for
                    this experiment.
                  type: string
                winnerVariationId:
                  description: >-
                    Variation ID (e.g. var_abc123) of the winning variation.
                    Used only as metadata. Required if results is 'won' and
                    there are multiple test variations. Otherwise, defaults to
                    the test variation when results is 'won' and to the baseline
                    variation for other results.
                  type: string
                analysis:
                  description: >-
                    Optional markdown summary displayed on the experiment
                    results page.
                  type: string
                reason:
                  description: >-
                    Optional reason for ending the phase stored on the latest
                    phase metadata.
                  type: string
                dateEnded:
                  description: >-
                    Optional ISO datetime for ending the latest phase. Defaults
                    to the current date and time.
                  type: string
                ignoreWarnings:
                  description: >-
                    Acknowledge and proceed past ACKNOWLEDGE-class warnings: a
                    value served to a running experiment, a locked dependent,
                    and dependents dropped by an archive. A blocked request
                    lists what this would acknowledge in `warnings`. Does NOT
                    clear validation-class failures (schema errors, cross-field
                    invariants, downstream schema breaks, or custom-hook
                    rejections) — those require `skipSchemaValidation` — EXCEPT
                    when the org disables 'block publishing on JSON schema
                    errors' (warn mode), where schema, invariant, and
                    schema-break failures become soft and this flag clears them
                    (custom-hook rejections still need `skipSchemaValidation`).
                    On publish endpoints this also force-merges a draft whose
                    base is stale, when you hold the bypass-approval permission.
                  type: boolean
              required:
                - results
              additionalProperties: false
      responses:
        '200':
          description: Resource created
          content:
            application/json:
              schema:
                type: object
                properties:
                  experiment:
                    $ref: '#/components/schemas/ExperimentWithEnhancedStatus'
                required:
                  - experiment
                additionalProperties: false
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                description: Resource is not in a valid status for this operation
                properties:
                  message:
