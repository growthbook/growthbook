  '/experiment-templates/{id}':
    get:
      $skipValidatorGeneration: true
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - ExperimentTemplates
      summary: Get a single experimentTemplate
      operationId: getExperimentTemplate
      x-codeSamples:
        - lang: cURL
          source: 'curl -X GET https://api.growthbook.io/api/v1/experiment-templates/{id} -u secret_abc123DEF456'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - experimentTemplate
                properties:
                  experimentTemplate:
                    $schema: 'https://json-schema.org/draft/2020-12/schema'
                    type: object
                    properties:
                      id:
                        type: string
                      dateCreated:
                        type: string
                        format: date-time
                        pattern: '^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$'
                      dateUpdated:
                        type: string
                        format: date-time
                        pattern: '^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$'
                      project:
                        type: string
                      owner:
                        description: The userId of the owner (or raw owner name/email for legacy records)
                        type: string
                      templateMetadata:
                        type: object
                        properties:
                          name:
                            type: string
                          description:
                            type: string
                        required:
                          - name
                        additionalProperties: false
                      type:
                        type: string
                        enum:
                          - standard
                      hypothesis:
                        type: string
                      description:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                      customFields:
                        type: object
                        propertyNames:
                          type: string
                        additionalProperties:
                          type: string
                      datasource:
                        type: string
                      exposureQueryId:
                        type: string
                      hashAttribute:
                        type: string
                      fallbackAttribute:
                        type: string
                      disableStickyBucketing:
                        type: boolean
                      goalMetrics:
                        type: array
                        items:
                          type: string
                      secondaryMetrics:
                        type: array
                        items:
                          type: string
                      guardrailMetrics:
                        type: array
                        items:
                          type: string
                      activationMetric:
                        type: string
                      statsEngine:
                        type: string
                        enum:
                          - bayesian
                          - frequentist
                      segment:
                        type: string
                      skipPartialData:
                        type: boolean
                      targeting:
                        type: object
                        properties:
                          coverage:
                            type: number
                          savedGroups:
                            type: array
                            items:
                              type: object
                              properties:
                                match:
                                  type: string
                                  enum:
                                    - all
                                    - none
                                    - any
                                ids:
                                  type: array
                                  items:
                                    type: string
                              required:
                                - match
                                - ids
                              additionalProperties: false
                          prerequisites:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                condition:
                                  type: string
                              required:
                                - id
                                - condition
                              additionalProperties: false
                          condition:
                            type: string
                        required:
                          - coverage
                          - condition
                        additionalProperties: false
                      customMetricSlices:
                        type: array
                        items:
                          type: object
                          properties:
                            slices:
                              type: array
                              items:
                                type: object
                                properties:
                                  column:
                                    type: string
                                  levels:
                                    type: array
                                    items:
                                      type: string
                                required:
                                  - column
                                  - levels
                                additionalProperties: false
                          required:
                            - slices
                          additionalProperties: false
                    required:
                      - id
                      - dateCreated
                      - dateUpdated
                      - owner
                      - templateMetadata
                      - type
                      - datasource
                      - exposureQueryId
                      - statsEngine
                      - targeting
                    additionalProperties: false
