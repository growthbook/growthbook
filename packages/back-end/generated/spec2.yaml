                          operator:
                            type: string
                          value:
                            type: string
                        required:
                          - property
                          - operator
                          - value
                        additionalProperties: false
                  required:
                    - eventName
                    - userAggregation
                  additionalProperties: false
              required:
                - datasourceId
                - name
                - type
              additionalProperties: false
