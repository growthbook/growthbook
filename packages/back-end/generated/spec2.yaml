                    type: array
                    items:
                      type: object
                      properties:
                        metricId:
                          description: The metric ID
                          type: string
                        error:
                          description: >-
                            Set when the metric does not exist or the caller has
                            no permission to read it.
                          type: string
                        experiments:
                          description: List of experiments using this metric
                          type: array
                          items:
                            type: object
                            properties:
                              experimentId:
                                description: The experiment ID
                                type: string
                              experimentStatus:
                                description: The current status of the experiment
                                type: string
                                enum:
                                  - draft
                                  - running
                                  - stopped
                              lastSnapshotAttempt:
                                description: >-
                                  The last time a snapshot was attempted for
                                  this experiment
                                anyOf:
                                  - type: string
                                  - type: 'null'
                            required:
                              - experimentId
                              - experimentStatus
                              - lastSnapshotAttempt
                            additionalProperties: false
                        lastSnapshotAttempt:
                          description: >-
                            The most recent snapshot attempt across all
                            experiments using this metric
