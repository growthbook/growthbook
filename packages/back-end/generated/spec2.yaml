                            description: >-
                              Controls the lookback override for the experiment.
                              For type "window", value must be a non-negative
                              number and valueUnit is required.
                            type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - date
                                  - window
                              value:
                                description: >-
                                  For "window" type - non-negative numeric value
                                  (e.g. 7 for 7 days). For "date" type a date
                                  string.
                                anyOf:
                                  - description: >-
                                      For "window" type - non-negative numeric
                                      value (e.g. 7 for 7 days). For "date" type
                                      a date string.
                                    type: number
                                  - description: >-
                                      For "window" type - non-negative numeric
                                      value (e.g. 7 for 7 days). For "date" type
                                      a date string.
                                    type: string
                              valueUnit:
                                description: >-
                                  Used when type is "window". Defaults to
                                  "days".
                                type: string
                                enum:
