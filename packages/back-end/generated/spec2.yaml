  /stale-features:
    get:
      operationId: getFeatureStale
      summary: Get stale status for one or more features
      tags:
        - features
      parameters:
        - $ref: '#/components/parameters/ids'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    description: >-
                      Map of feature ID to stale status. Only requested features
                      that were found and readable are included.
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: object
                      properties:
                        featureId:
                          description: The feature key
                          type: string
                        isStale:
                          description: >-
                            Whether the feature is considered stale overall (all
                            enabled environments are stale). Always false when
                            neverStale is true.
                          type: boolean
                        staleReason:
                          description: >
                            Reason for the feature's stale or non-stale status.
                            `never-stale` when stale detection is disabled.
                            Non-stale reasons: `recently-updated`,
                            `active-draft`, `has-dependents`. Stale reasons:
                            `no-rules`, `rules-one-sided`, `abandoned-draft`,
                            `toggled-off`. Null when non-stale with no single
                            cause (see staleByEnv).
                          anyOf:
                            - type: string
                              enum:
                                - never-stale
                                - recently-updated
                                - active-draft
                                - has-dependents
                                - no-rules
                                - rules-one-sided
                                - abandoned-draft
                                - toggled-off
                                - active-experiment
                                - has-rules
                            - type: 'null'
                        neverStale:
                          description: >-
                            When true the feature is permanently excluded from
                            stale detection.
                          type: boolean
                        staleByEnv:
                          description: >-
                            Per-environment staleness breakdown, keyed by
                            environment ID. Present when environments exist and
                            neverStale is false.
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties:
                            type: object
                            properties:
                              isStale:
                                description: Whether this environment is stale
                                type: boolean
                              reason:
                                description: >-
                                  Reason for the stale status in this
                                  environment
                                anyOf:
                                  - type: string
                                    enum:
                                      - no-rules
                                      - rules-one-sided
                                      - abandoned-draft
                                      - toggled-off
                                      - active-experiment
                                      - has-rules
                                      - recently-updated
                                      - active-draft
                                      - has-dependents
                                  - type: 'null'
                              evaluatesTo:
                                description: >
                                  The deterministic value this feature evaluates
                                  to in this environment. Uses the same raw
                                  string encoding as `feature.defaultValue`.
                                  Only present when the value is deterministic
                                  or the environment is toggled off.
                                type: string
                            required:
                              - isStale
                              - reason
                            additionalProperties: false
                      required:
                        - featureId
                        - isStale
                        - staleReason
                        - neverStale
                      additionalProperties: false
                required:
                  - features
                additionalProperties: false
