                                  type: boolean
                                regressionAdjustmentEnabled:
                                  type: boolean
                                regressionAdjustmentDays:
                                  type: number
                              required:
                                - id
                              additionalProperties: false
                          goals:
                            type: array
                            items:
                              type: object
                              properties:
                                metricId:
                                  type: string
                                overrides:
                                  type: object
                                  properties:
                                    delayHours:
                                      type: number
                                    windowHours:
                                      type: number
                                    window:
                                      type: string
                                      enum:
                                        - conversion
                                        - lookback
                                        - ''
                                    winRiskThreshold:
                                      type: number
                                    loseRiskThreshold:
                                      type: number
                                    properPriorOverride:
                                      type: boolean
                                    properPriorEnabled:
                                      type: boolean
                                    properPriorMean:
                                      type: number
                                    properPriorStdDev:
                                      type: number
                                    regressionAdjustmentOverride:
                                      type: boolean
                                    regressionAdjustmentEnabled:
                                      type: boolean
                                    regressionAdjustmentDays:
                                      type: number
                                  additionalProperties: false
                              required:
                                - metricId
                                - overrides
                              additionalProperties: false
                          secondaryMetrics:
                            type: array
                            items:
                              type: object
                              properties:
                                metricId:
                                  type: string
                                overrides:
                                  type: object
                                  properties:
                                    delayHours:
                                      type: number
                                    windowHours:
                                      type: number
                                    window:
                                      type: string
                                      enum:
                                        - conversion
