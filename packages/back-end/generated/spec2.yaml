                                      type: number
                                  additionalProperties: false
                              required:
                                - metricId
                                - overrides
                              additionalProperties: false
                          guardrails:
                            type: array
                            items:
                              type: object
                              properties:
                                metricId:
                                  type: string
                                overrides:
                                  type: object
                                  properties:
                                    delayHours:
                                      type: number
                                    windowHours:
                                      type: number
                                    window:
                                      type: string
                                      enum:
                                        - conversion
