                                        - ''
                                    winRiskThreshold:
                                      type: number
                                    loseRiskThreshold:
                                      type: number
                                    properPriorOverride:
                                      type: boolean
                                    properPriorEnabled:
                                      type: boolean
                                    properPriorMean:
                                      type: number
                                    properPriorStdDev:
                                      type: number
                                    regressionAdjustmentOverride:
                                      type: boolean
                                    regressionAdjustmentEnabled:
                                      type: boolean
