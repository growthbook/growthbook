                          - type: number
                            const: 2
                      disableStickyBucketing:
                        type: boolean
                      bucketVersion:
                        type: number
                      minBucketVersion:
                        type: number
                      variations:
                        type: array
                        items:
                          type: object
                          properties:
                            variationId:
                              type: string
                            key:
                              type: string
                            name:
                              type: string
                            description:
                              type: string
                            screenshots:
                              type: array
                              items:
                                type: string
                          required:
                            - variationId
                            - key
                            - name
                            - description
                            - screenshots
                          additionalProperties: false
                      phases:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            dateStarted:
                              type: string
                            dateEnded:
                              type: string
                            reasonForStopping:
                              type: string
                            seed:
                              type: string
                            coverage:
                              type: number
                            trafficSplit:
                              type: array
                              items:
                                type: object
                                properties:
                                  variationId:
                                    type: string
                                  weight:
                                    type: number
                                required:
                                  - variationId
                                  - weight
                                additionalProperties: false
                            namespace:
                              type: object
                              properties:
