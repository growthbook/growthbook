                            type: string
                          assignmentQueryId:
                            type: string
                          experimentId:
                            type: string
                          segmentId:
                            type: string
                          queryFilter:
                            type: string
                          inProgressConversions:
                            type: string
                            enum:
                              - include
                              - exclude
                          attributionModel:
                            description: >-
