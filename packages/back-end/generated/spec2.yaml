                                additionalProperties: false
                            savedGroupTargeting:
                              type: array
                              items:
                                type: object
                                properties:
                                  matchType:
                                    type: string
                                    enum:
                                      - all
                                      - any
                                      - none
                                  savedGroups:
                                    type: array
                                    items:
                                      type: string
                                required:
                                  - matchType
                                  - savedGroups
                                additionalProperties: false
                          required:
