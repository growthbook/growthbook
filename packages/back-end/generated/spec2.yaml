                            type: string
                          inProgressConversions:
                            type: string
                            enum:
                              - include
                              - exclude
                          attributionModel:
                            description: >-
                              Setting attribution model to
                              `"experimentDuration"` is the same as selecting
                              "Ignore Conversion Windows" for the Conversion
                              Window Override. Setting it to
                              `"lookbackOverride"` requires a `lookbackOverride`
                              object to be provided.
