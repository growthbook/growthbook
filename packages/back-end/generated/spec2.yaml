    post:
      operationId: updateExperiment
      summary: Update a single experiment
      tags:
        - experiments
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                datasourceId:
                  description: >-
                    Can only be set if existing experiment does not have a
                    datasource
                  type: string
                assignmentQueryId:
                  type: string
                trackingKey:
                  type: string
                bypassDuplicateKeyCheck:
                  description: >-
                    If true, allow updating the tracking key even if another
                    experiment with the same tracking key already exists
                  type: boolean
                name:
                  description: Name of the experiment
                  type: string
                type:
                  type: string
                  enum:
                    - standard
                    - multi-armed-bandit
                project:
                  description: Project ID which the experiment belongs to
                  type: string
                hypothesis:
                  description: Hypothesis of the experiment
                  type: string
                description:
                  description: Description of the experiment
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                metrics:
                  type: array
                  items:
                    type: string
                secondaryMetrics:
                  type: array
                  items:
                    type: string
                guardrailMetrics:
                  type: array
                  items:
                    type: string
                activationMetric:
                  description: Users must convert on this metric before being included
                  type: string
                segmentId:
                  description: Only users in this segment will be included
                  type: string
                queryFilter:
                  description: WHERE clause to add to the default experiment query
                  type: string
                owner:
                  description: Email of the person who owns this experiment
                  type: string
                archived:
                  type: boolean
                status:
                  type: string
                  enum:
                    - draft
                    - running
                    - stopped
                autoRefresh:
                  type: boolean
                hashAttribute:
                  type: string
                fallbackAttribute:
                  type: string
                hashVersion:
                  anyOf:
                    - type: number
                      const: 1
                    - type: number
                      const: 2
                disableStickyBucketing:
                  type: boolean
                bucketVersion:
                  type: number
                minBucketVersion:
                  type: number
                results:
                  description: >-
                    The result status of the experiment. Maps to
                    resultSummary.status in the GET response.
                  type: string
                  enum:
                    - dnf
                    - won
                    - lost
                    - inconclusive
                winner:
                  description: >-
                    The index of the winning variation (0-indexed). Maps to
                    resultSummary.winner (variation ID) in the GET response.
                  type: number
                analysis:
                  description: >-
                    Analysis summary or conclusions for the experiment. Maps to
                    resultSummary.conclusions in the GET response.
                  type: string
                releasedVariationId:
                  description: >-
                    The ID of the released variation. Maps to
                    resultSummary.releasedVariationId in the GET response.
                  type: string
                excludeFromPayload:
                  description: >-
                    If true, the experiment is excluded from the SDK payload.
                    Maps to resultSummary.excludeFromPayload in the GET
                    response.
                  type: boolean
                inProgressConversions:
                  type: string
                  enum:
                    - loose
                    - strict
                attributionModel:
                  description: >-
                    Setting attribution model to `"experimentDuration"` is the
                    same as selecting "Ignore Conversion Windows" for the
                    Conversion Window Override. Setting it to
                    `"lookbackOverride"` requires a `lookbackOverride` object to
                    be provided.
                  type: string
                  enum:
                    - firstExposure
                    - experimentDuration
                    - lookbackOverride
                lookbackOverride:
                  description: >-
                    Controls the lookback override for the experiment. For type
                    "window", value must be a non-negative number and valueUnit
                    is required.
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - date
                        - window
                    value:
                      description: >-
                        For "window" type - non-negative numeric value (e.g. 7
                        for 7 days). For "date" type a date string.
                      anyOf:
                        - description: >-
                            For "window" type - non-negative numeric value (e.g.
                            7 for 7 days). For "date" type a date string.
                          type: number
                        - description: >-
                            For "window" type - non-negative numeric value (e.g.
                            7 for 7 days). For "date" type a date string.
                          type: string
                    valueUnit:
                      description: Used when type is "window". Defaults to "days".
                      type: string
                      enum:
                        - minutes
                        - hours
                        - days
                        - weeks
                  required:
                    - type
                    - value
                  additionalProperties: false
                statsEngine:
                  type: string
                  enum:
                    - bayesian
                    - frequentist
                variations:
                  minItems: 2
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      key:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      screenshots:
                        type: array
                        items:
                          type: object
                          properties:
                            path:
                              type: string
                            width:
                              type: number
                            height:
                              type: number
                            description:
                              type: string
                          required:
                            - path
                          additionalProperties: false
                    required:
                      - key
                      - name
                    additionalProperties: false
                phases:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      dateStarted:
                        type: string
                      dateEnded:
                        type: string
                      reasonForStopping:
                        type: string
                      seed:
                        type: string
                      coverage:
                        type: number
                      trafficSplit:
                        description: Deprecated and unused. Use variationWeights instead.
                        type: array
                        items:
                          type: object
                          properties:
                            variationId:
                              type: string
                            weight:
                              type: number
                          required:
                            - variationId
                            - weight
                          additionalProperties: false
                      namespace:
                        type: object
                        properties:
                          namespaceId:
                            type: string
                          range:
                            minItems: 2
                            maxItems: 2
                            type: array
                            items:
                              type: number
                          enabled:
                            type: boolean
                        required:
                          - namespaceId
                          - range
                        additionalProperties: false
                      targetingCondition:
                        type: string
                      prerequisites:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              description: Feature ID
                              type: string
                            condition:
                              type: string
                          required:
                            - id
                            - condition
                          additionalProperties: false
                      reason:
                        type: string
                      condition:
                        type: string
                      savedGroupTargeting:
                        type: array
                        items:
                          type: object
                          properties:
                            matchType:
                              type: string
                              enum:
                                - all
                                - any
                                - none
                            savedGroups:
                              type: array
                              items:
                                type: string
                          required:
                            - matchType
                            - savedGroups
                          additionalProperties: false
                      variationWeights:
                        type: array
                        items:
                          type: number
                    required:
                      - name
                      - dateStarted
                    additionalProperties: false
                regressionAdjustmentEnabled:
                  description: >-
                    Controls whether regression adjustment (CUPED) is enabled
                    for experiment analyses
                  type: boolean
                sequentialTestingEnabled:
                  description: Only applicable to frequentist analyses
                  type: boolean
                sequentialTestingTuningParameter:
                  type: number
                shareLevel:
                  type: string
                  enum:
                    - public
                    - organization
                banditScheduleValue:
                  type: number
                banditScheduleUnit:
                  type: string
                  enum:
                    - days
                    - hours
                banditBurnInValue:
                  type: number
                banditBurnInUnit:
                  type: string
                  enum:
                    - days
                    - hours
                banditConversionWindowValue:
                  type: number
                banditConversionWindowUnit:
                  type: string
                  enum:
                    - days
                    - hours
                postStratificationEnabled:
                  description: When null, the organization default is used.
                  anyOf:
                    - description: When null, the organization default is used.
                      type: boolean
                    - description: When null, the organization default is used.
                      type: 'null'
                decisionFrameworkSettings:
                  description: >-
                    Controls the decision framework and metric overrides for the
                    experiment. Replaces the entire stored object on update
                    (does not patch individual fields).
                  type: object
                  properties:
                    decisionCriteriaId:
                      type: string
                    decisionFrameworkMetricOverrides:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            description: ID of the metric to override settings for.
                            type: string
                          targetMDE:
                            description: >-
                              The target relative MDE to use for the metric,
                              expressed as proportions (e.g. use 0.1 for 10%).
                              Must be greater than 0.
                            type: number
                            exclusiveMinimum: 0
                        required:
                          - id
                        additionalProperties: false
                  additionalProperties: false
                metricOverrides:
                  description: >-
                    Per-metric analysis overrides for this experiment. Replaces
                    the entire stored array (does not patch individual entries).
                  type: array
                  items:
                    description: >-
                      Per-metric analysis overrides stored on the experiment
                      (matches internal metricOverrides).
                    type: object
                    properties:
                      id:
                        description: ID of the metric to override settings for.
                        type: string
                      windowType:
                        type: string
                        enum:
                          - conversion
                          - lookback
                          - ''
                      windowHours:
                        type: number
                      delayHours:
                        type: number
                      properPriorOverride:
                        description: >-
                          Must be true for the override to take effect. If true,
                          the other proper prior settings in this object will be
                          used if present.
                        type: boolean
                      properPriorEnabled:
                        type: boolean
                      properPriorMean:
                        type: number
                      properPriorStdDev:
                        type: number
                      regressionAdjustmentOverride:
                        description: >-
                          Must be true for the override to take effect. If true,
                          the other regression adjustment settings in this
                          object will be used if present.
                        type: boolean
                      regressionAdjustmentEnabled:
                        type: boolean
                      regressionAdjustmentDays:
                        type: number
                    required:
                      - id
                    additionalProperties: false
                defaultDashboardId:
                  description: ID of the default dashboard for this experiment.
                  type: string
                customFields:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    type: string
                customMetricSlices:
                  description: >-
                    Custom slices that apply to ALL applicable metrics in the
                    experiment
                  type: array
                  items:
                    type: object
                    properties:
                      slices:
                        type: array
                        items:
                          type: object
                          properties:
                            column:
                              type: string
                            levels:
                              type: array
                              items:
                                type: string
                          required:
                            - column
                            - levels
                          additionalProperties: false
                    required:
                      - slices
                    additionalProperties: false
              additionalProperties: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  experiment:
                    type: object
                    properties:
                      id:
                        type: string
                      trackingKey:
                        type: string
                      dateCreated:
                        type: string
                      dateUpdated:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                        enum:
