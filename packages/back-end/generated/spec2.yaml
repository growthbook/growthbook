  /experiments/{id}/snapshot:
    post:
      operationId: postExperimentSnapshot
      summary: Create Experiment Snapshot
      tags:
        - experiments
        - snapshots
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                triggeredBy:
                  description: >-
                    Set to "schedule" if you want this request to trigger
                    notifications and other events as it if were a scheduled
                    update. Defaults to manual.
                  type: string
                  enum:
                    - manual
                    - schedule
              additionalProperties: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot:
                    type: object
                    properties:
                      id:
                        type: string
                      experiment:
                        type: string
                      status:
                        type: string
                    required:
                      - id
                      - experiment
                      - status
                    additionalProperties: false
                required:
                  - snapshot
                additionalProperties: false
