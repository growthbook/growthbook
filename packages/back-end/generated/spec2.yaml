                    type: string
                required:
                  - deletedId
                additionalProperties: false
    put:
      operationId: updatedashboard
      summary: update dashboards
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  description: The display name of the Dashboard
                  type: string
                editLevel:
                  description: >-
                    Dashboards that are "published" are editable by organization
                    members with appropriate permissions
                  type: string
                  enum:
                    - published
                    - private
                shareLevel:
                  description: >-
                    General Dashboards only. Dashboards that are "published" are
                    viewable by organization members with appropriate
                    permissions
                  type: string
                  enum:
                    - published
                    - private
                enableAutoUpdates:
                  description: >-
                    If enabled for a General Dashboard, also requires an
                    updateSchedule
                  type: boolean
                updateSchedule:
                  description: >-
                    General Dashboards only. Experiment Dashboards update based
                    on the parent experiment instead
                  anyOf:
                    - type: object
                      properties:
                        type:
                          type: string
                          const: stale
                        hours:
                          type: number
                      required:
                        - type
                        - hours
