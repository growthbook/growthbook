                  type: object
                  properties:
                    identifierTypeColumns:
                      type: array
                      items:
                        type: object
                        properties:
                          identifierType:
                            type: string
                          columnName:
                            type: string
                        required:
                          - identifierType
                          - columnName
                        additionalProperties: false
                    tableName:
                      type: string
                    valueColumnName:
                      type: string
                    timestampColumnName:
                      type: string
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
                          column:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                        required:
                          - column
                          - operator
                          - value
                        additionalProperties: false
                  required:
                    - identifierTypeColumns
                    - tableName
                    - timestampColumnName
                  additionalProperties: false
                mixpanel:
                  description: >-
                    Only use for MixPanel (non-SQL) Data Sources. Only one of
                    `sql`, `sqlBuilder` or `mixpanel` allowed, and at least one
                    must be specified.
                  type: object
                  properties:
                    eventName:
                      type: string
                    eventValue:
                      type: string
                    userAggregation:
                      type: string
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
