                          - multi-armed-bandit
                      project:
                        type: string
                      hypothesis:
                        type: string
                      description:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                      owner:
                        type: string
                      archived:
                        type: boolean
                      status:
                        type: string
                      autoRefresh:
                        type: boolean
                      hashAttribute:
                        type: string
                      fallbackAttribute:
                        type: string
                      hashVersion:
                        anyOf:
                          - type: number
