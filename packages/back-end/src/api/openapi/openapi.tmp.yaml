  /experiment-templates:
    get:
      $skipValidatorGeneration: true
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      tags:
        - ExperimentTemplates
      summary: Get all experimentTemplates
      operationId: listExperimentTemplates
      x-codeSamples:
        - lang: cURL
          source: >-
            curl -X GET https://api.growthbook.io/api/v1/experiment-templates -u
            secret_abc123DEF456
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - experimentTemplates
                properties:
                  experimentTemplates:
                    $schema: https://json-schema.org/draft/2020-12/schema
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        dateCreated:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        dateUpdated:
                          type: string
