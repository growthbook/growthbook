type: object
required:
  - datasource
  - dimensions
  - chartType
  - dateRange
  - dataset
properties:
  datasource:
    type: string
    description: ID of the datasource to query
  dimensions:
    $ref: "#/$defs/Dimensions"
  chartType:
    $ref: "#/$defs/ChartType"
  dateRange:
    $ref: "#/$defs/DateRange"
  dataset:
    type: object
    required:
      - type
      - values
    properties:
      type:
        type: string
        enum:
          - metric
      values:
        type: array
        description: One or more metrics to chart
        items:
          type: object
          required:
            - type
            - name
            - rowFilters
            - metricId
            - unit
            - denominatorUnit
          properties:
            type:
              type: string
              enum:
                - metric
            name:
              type: string
            rowFilters:
              $ref: "#/$defs/RowFilters"
            metricId:
              type: string
            unit:
              type: string
              nullable: true
            denominatorUnit:
              type: string
              nullable: true
$defs:
  ChartType:
    type: string
    enum:
      - line
      - area
      - timeseries-table
      - table
      - bar
      - stackedBar
      - horizontalBar
      - stackedHorizontalBar
      - bigNumber
  DateRange:
    type: object
    required:
      - predefined
      - lookbackValue
      - lookbackUnit
      - startDate
      - endDate
    properties:
      predefined:
        type: string
        enum:
          - today
          - last7Days
          - last30Days
          - last90Days
          - customLookback
          - customDateRange
      lookbackValue:
        type: number
        nullable: true
        description: Required when predefined is `customLookback`.
      lookbackUnit:
        type: string
        nullable: true
        enum:
          - hour
          - day
          - week
          - month
        description: Required when predefined is `customLookback`.
      startDate:
        type: string
        nullable: true
        description: ISO date string. Required when predefined is `customDateRange`.
      endDate:
        type: string
        nullable: true
        description: ISO date string. Required when predefined is `customDateRange`.
  RowFilters:
    type: array
    items:
      type: object
      required:
        - operator
      properties:
        operator:
          type: string
          enum:
            - "="
            - "!="
            - "<"
            - "<="
            - ">"
            - ">="
            - "in"
            - "not_in"
            - "contains"
            - "not_contains"
            - "starts_with"
            - "ends_with"
            - "is_null"
            - "not_null"
            - "is_true"
            - "is_false"
            - "sql_expr"
            - "saved_filter"
        column:
          type: string
        values:
          type: array
          items:
            type: string
  Dimensions:
    type: array
    description: Dimensions to group results by
    items:
      type: object
      required:
        - dimensionType
      properties:
        dimensionType:
          type: string
          enum:
            - date
            - dynamic
            - static
            - slice
        column:
          type: string
          nullable: true
          description: Required for `date`, `dynamic`, and `static` dimension types.
        dateGranularity:
          type: string
          enum:
            - auto
            - hour
            - day
            - week
            - month
            - year
          description: Required when dimensionType is `date`.
        maxValues:
          type: number
          description: Required when dimensionType is `dynamic`.
        values:
          type: array
          items:
            type: string
          description: Required when dimensionType is `static`.
        slices:
          type: array
          description: Required when dimensionType is `slice`.
          items:
            type: object
            required:
              - name
              - filters
            properties:
              name:
                type: string
              filters:
                $ref: "#/$defs/RowFilters"
