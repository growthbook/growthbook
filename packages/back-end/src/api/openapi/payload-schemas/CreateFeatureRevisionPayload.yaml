type: object
description: |
  Changes to apply to the new draft revision. All fields are optional. Any field omitted carries
  forward from the live revision unchanged. The created revision is always saved as a draft —
  no publishing happens.
properties:
  defaultValue:
    type: string
  environments:
    type: object
    additionalProperties:
      $ref: "./postFeature/FeatureEnvironment.yaml"
  prerequisites:
    type: array
    description: "Feature IDs. Each feature must evaluate to `true`"
    items:
      type: string
  archived:
    type: boolean
  description:
    type: string
    description: Description of the feature (stored in revision metadata)
  owner:
    type: string
    description: Stored in revision metadata
  project:
    type: string
    description: An associated project ID (stored in revision metadata)
  tags:
    type: array
    items:
      type: string
    description: List of associated tags (stored in revision metadata)
  customFields:
    type: object
    additionalProperties:
      type: string
  jsonSchema:
    type: string
    description: Use JSON schema to validate the payload of a JSON-type feature value (enterprise only).
  holdout:
    nullable: true
    description: >
      Holdout to assign this feature to. Pass `null` to remove the feature
      from its current holdout. Omit the field entirely to leave the holdout
      unchanged.
    type: object
    required:
      - id
      - value
    properties:
      id:
        type: string
        description: Holdout ID
      value:
        type: string
        description: The feature value assigned to users in the holdout treatment group
  title:
    type: string
    description: Optional short title for the draft revision
  comment:
    type: string
    description: Optional comment to attach to the draft revision
