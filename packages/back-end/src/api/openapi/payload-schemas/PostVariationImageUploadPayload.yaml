type: object
required:
  - screenshot
  - contentType
properties:
  screenshot:
    type: string
    description: Base64-encoded screenshot data
    contentEncoding: base64
  contentType:
    type: string
    description: MIME type of the screenshot
    enum:
      - image/png
      - image/jpeg
      - image/gif
  description:
    type: string
    description: Optional description for the screenshot
