type: object
required:
  - editorUrl
  - urlPatterns
properties:
  editorUrl:
    type: string
    description: URL of the page opened in the visual editor when creating this changeset
  urlPatterns:
    type: array
    description: URL patterns that determine which pages this visual changeset applies to
    items:
      type: object
      required:
        - type
        - pattern
      properties:
        include:
          type: boolean
        type:
          type: string
          enum: [simple, regex]
        pattern:
          type: string
