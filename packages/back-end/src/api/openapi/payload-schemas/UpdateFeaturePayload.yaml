type: object
properties:
  description:
    type: string
    description: Description of the feature
  archived:
    type: boolean
  project:
    type: string
    description: An associated project ID
  owner:
    type: string
  defaultValue:
    type: string
  tags:
    type: array
    items:
      type: string
    description: List of associated tags. Will override tags completely with submitted list
  environments:
    type: object
    additionalProperties:
      $ref: "./postFeature/FeatureEnvironment.yaml"
  prerequisites:
    type: array
    description: |
      Feature-level prerequisite feature flag IDs. Each referenced feature must evaluate to `true`
      before any rules in this feature are evaluated. For rule-level prerequisites with conditions,
      use the `prerequisites` field on individual rules.
    items:
      type: string
  jsonSchema:
    type: string
    description: Use JSON schema to validate the payload of a JSON-type feature value (enterprise only).
  customFields:
    type: object
    additionalProperties:
      type: string
  holdout:
    nullable: true
    description: >
      Holdout to assign this feature to. Pass `null` to remove the feature
      from its current holdout. Omit the field entirely to leave the holdout
      unchanged.
    type: object
    required:
      - id
      - value
    properties:
      id:
        type: string
        description: Holdout ID
      value:
        type: string
        description: The feature value assigned to users in the holdout treatment group
  adminOverride:
    type: boolean
    default: false
    description: |
      Pass `true` to bypass approval requirements and immediately publish the change.
      Requires the organization setting "REST API always bypasses approval requirements" to be enabled.
