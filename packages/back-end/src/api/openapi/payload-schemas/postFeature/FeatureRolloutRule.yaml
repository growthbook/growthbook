type: object
required:
  - type
  - value
  - coverage
  - hashAttribute
properties:
  description:
    type: string
  condition:
    type: string
    description: Applied to everyone by default.
  savedGroupTargeting:
    type: array
    items:
      type: object
      required:
        - matchType
        - savedGroups
      properties:
        matchType:
          type: string
          enum:
            - "all"
            - "any"
            - "none"
        savedGroups:
          type: array
          items:
            type: string
  prerequisites:
    type: array
    items:
      type: object
      required:
        - id
        - condition
      properties:
        id:
          type: string
          description: "Feature ID"
        condition:
          type: string
  scheduleRules:
    type: array
    items:
      $ref: "../../schemas/ScheduleRule.yaml"
    example:
      - enabled: true
        timestamp: null
      - enabled: false
        timestamp: "2025-06-23T16:09:37.769Z"
  id:
    type: string
  enabled:
    type: boolean
    description: Enabled by default
  type:
    type: string
    enum:
      - rollout
  value:
    type: string
  coverage:
    type: number
    description: Percent of traffic included in this experiment. Users not included in the experiment will skip this rule.
  hashAttribute:
    type: string
  rampSchedule:
    type: object
    description: Optional timed coverage ramp. When present, the rule's effective coverage advances through `steps` in order, holding each for `holdSeconds`, then graduates to 100%. The ramp starts when the rule is first published. Overrides the static `coverage` field while active.
    required:
      - steps
    properties:
      steps:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - coverage
            - holdSeconds
          properties:
            coverage:
              type: number
              minimum: 0
              maximum: 1
            holdSeconds:
              type: number
              exclusiveMinimum: 0
              description: How long to hold at this coverage before advancing.
    example:
      steps:
        - coverage: 0.01
          holdSeconds: 600
        - coverage: 0.1
          holdSeconds: 600
        - coverage: 0.5
          holdSeconds: 1800
