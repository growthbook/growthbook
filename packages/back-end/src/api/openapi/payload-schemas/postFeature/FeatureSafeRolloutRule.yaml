type: object
required:
  - type
  - controlValue
  - variationValue
  - safeRolloutId
  - hashAttribute
  - trackingKey
  - seed
properties:
  description:
    type: string
  id:
    type: string
  enabled:
    type: boolean
  type:
    type: string
    enum:
      - safe-rollout
  controlValue:
    type: string
  variationValue:
    type: string
  safeRolloutId:
    type: string
  hashAttribute:
    type: string
  trackingKey:
    type: string
  seed:
    type: string
  condition:
    type: string
  savedGroupTargeting:
    type: array
    items:
      type: object
      required:
        - matchType
        - savedGroups
      properties:
        matchType:
          type: string
          enum:
            - "all"
            - "any"
            - "none"
        savedGroups:
          type: array
          items:
            type: string
  scheduleRules:
    type: array
    items:
      $ref: "../../schemas/ScheduleRule.yaml"
