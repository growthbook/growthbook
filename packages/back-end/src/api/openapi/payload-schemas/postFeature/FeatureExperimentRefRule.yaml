type: object
required:
  - type
  - variations
  - experimentId
properties:
  description:
    type: string
  id:
    type: string
  enabled:
    type: boolean
    description: Enabled by default
  type:
    type: string
    enum:
      - experiment-ref
  condition:
    type: string
    description: |
      Targeting condition as a **JSON string** using MongoDB-style query syntax.
      Evaluated against user attributes — the rule only applies to users who match.
      Omit or pass `""` to match everyone.

      Examples:
      - `{"country": "US"}` — exact match
      - `{"plan": {"$in": ["pro", "enterprise"]}}` — array membership
    example: '{"country": "US"}'
  savedGroupTargeting:
    type: array
    description: |
      Filter by Saved Groups defined in your GrowthBook organization (SDK Connections → Saved Groups).
      All entries are combined with AND — a user must satisfy every entry.
    items:
      type: object
      required:
        - matchType
        - savedGroups
      properties:
        matchType:
          type: string
          enum:
            - "all"
            - "any"
            - "none"
          description: "`all` = user must be in all groups, `any` = at least one, `none` = not in any"
        savedGroups:
          type: array
          description: "Saved Group IDs to match against"
          items:
            type: string
  prerequisites:
    type: array
    description: |
      Prerequisite feature flags that must evaluate to specific values before this rule applies.
      All prerequisites must pass (AND logic).
    items:
      type: object
      required:
        - id
        - condition
      properties:
        id:
          type: string
          description: "Feature flag ID of the prerequisite feature"
        condition:
          type: string
          description: |
            A **JSON string** condition checked against `{"value": <feature_flag_value>}`.
            Example: `{"value": true}` (flag is on) or `{"value": {"$in": ["a", "b"]}}`
          example: '{"value": true}'
  scheduleRules:
    type: array
    items:
      $ref: "../../schemas/ScheduleRule.yaml"
  variations:
    type: array
    items:
      type: object
      required:
        - variationId
        - value
      properties:
        variationId:
          type: string
          description: "Variation ID from the linked experiment"
        value:
          type: string
  experimentId:
    type: string
