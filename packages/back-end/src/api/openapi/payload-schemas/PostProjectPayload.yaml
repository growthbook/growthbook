type: object
required:
  - name
properties:
  name:
    type: string
  description:
    type: string
  publicId:
    type: string
    description: URL-safe slug (lowercase letters, numbers, dashes). Auto-generated from name if not provided.
  settings:
    description: Project settings.
    type: object
    properties:
      statsEngine:
        description: Stats engine.
        type: string
