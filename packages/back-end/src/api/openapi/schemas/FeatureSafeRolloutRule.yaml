allOf:
  - $ref: "./FeatureBaseRule.yaml"
  - type: object
    required:
      - type
      - controlValue
      - variationValue
    properties:
      type:
        type: string
        enum: ["safe-rollout"]
      controlValue:
        type: string
      variationValue:
        type: string
      seed:
        type: string
      hashAttribute:
        type: string
      trackingKey:
        type: string
      safeRolloutId:
        type: string
      status:
        type: string
        enum:
          - "running"
          - "released"
          - "rolled-back"
          - "stopped"
