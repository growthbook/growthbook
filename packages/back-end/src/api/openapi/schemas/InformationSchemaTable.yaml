type: object
required:
  - id
  - datasourceId
  - informationSchemaId
  - tableName
  - tableSchema
  - databaseName
  - columns
  - refreshMS
  - dateCreated
  - dateUpdated
properties:
  id:
    type: string
  datasourceId:
    type: string
  informationSchemaId:
    type: string
  tableName:
    type: string
  tableSchema:
    type: string
  databaseName:
    type: string
  columns:
    type: array
    items:
      type: object
      required:
        - columnName
        - dataType
      properties:
        columnName:
          type: string
        dataType:
          type: string
  refreshMS:
    type: number
  dateCreated:
    type: string
    format: date-time
  dateUpdated:
    type: string
    format: date-time
