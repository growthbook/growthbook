oneOf:
  - title: "Create ramp schedule"
    type: object
    required:
      - mode
      - ruleId
    properties:
      mode:
        type: string
        enum: [create]
      name:
        type: string
        description: "Display name for the ramp schedule. Defaults to \"Ramp schedule – {Month YYYY}\" if omitted."
      ruleId:
        type: string
        description: "Rule ID this action applies to"
      templateId:
        type: string
        description: "Load steps and endActions from a saved template. Explicit `steps`/`endActions` take precedence over the template."
      environment:
        type: string
        nullable: true
        description: "Scope patches to this environment only; null applies to all environments sharing the ruleId"
      startDate:
        type: string
        format: date-time
        nullable: true
        description: "When to start the ramp; absent or null means start immediately on publish"
      steps:
        type: array
        description: "Ordered ramp steps. Omit when using `templateId` — the template's steps are used instead. Explicit steps always take precedence over the template."
        items:
          type: object
          required:
            - trigger
          properties:
            trigger:
              oneOf:
                - type: object
                  required: [type, seconds]
                  properties:
                    type:
                      type: string
                      enum: [interval]
                    seconds:
                      type: number
                      description: "Hold duration in seconds"
                - type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [approval]
                - type: object
                  required: [type, at]
                  properties:
                    type:
                      type: string
                      enum: [scheduled]
                    at:
                      type: string
                      format: date-time
              discriminator:
                propertyName: type
            actions:
              type: array
              description: "Patches to apply at this step. `targetType` and `targetId` are auto-injected from the top-level `ruleId`."
              items:
                type: object
                required:
                  - patch
                properties:
                  targetType:
                    type: string
                    enum: [feature-rule]
                    description: "Auto-injected from context — omit unless you need to override."
                  targetId:
                    type: string
                    description: "Auto-injected from context — omit unless you need to override."
                  patch:
                    type: object
                    description: "Sparse rule patch applied at this step. Only fields present are applied; absent fields accumulate from previous steps."
                    properties:
                      coverage:
                        type: number
                        minimum: 0
                        maximum: 1
                        description: "Rollout percent (0–1)"
                      condition:
                        type: string
                        description: "Targeting condition as a JSON string (MongoDB-style)"
                      savedGroups:
                        type: array
                        items:
                          type: object
                          required: [match, ids]
                          properties:
                            match:
                              type: string
                              enum: [all, any, none]
                            ids:
                              type: array
                              items:
                                type: string
                      prerequisites:
                        type: array
                        items:
                          type: object
                          required: [id, condition]
                          properties:
                            id:
                              type: string
                            condition:
                              type: string
                      force:
                        description: "Force value (any JSON type — boolean, string, number, or object)"
                        nullable: true
                      enabled:
                        type: boolean
                        description: "System-managed: injected as `true` when the ramp step fires"
            approvalNotes:
              type: string
              nullable: true
      endActions:
        type: array
        description: "Final patches applied when the ramp completes. `targetType` and `targetId` are auto-injected."
        items:
          type: object
          required:
            - patch
          properties:
            targetType:
              type: string
              enum: [feature-rule]
              description: "Auto-injected — omit unless overriding."
            targetId:
              type: string
              description: "Auto-injected — omit unless overriding."
            patch:
              type: object
              description: "Sparse rule patch. Same fields as step actions."
              properties:
                coverage:
                  type: number
                  minimum: 0
                  maximum: 1
                condition:
                  type: string
                savedGroups:
                  type: array
                  items:
                    type: object
                    required: [match, ids]
                    properties:
                      match:
                        type: string
                        enum: [all, any, none]
                      ids:
                        type: array
                        items:
                          type: string
                prerequisites:
                  type: array
                  items:
                    type: object
                    required: [id, condition]
                    properties:
                      id:
                        type: string
                      condition:
                        type: string
                force:
                  description: "Force value (any JSON type)"
                  nullable: true
                enabled:
                  type: boolean
      endCondition:
        type: object
        description: "Optional condition that terminates the ramp early"
        properties:
          trigger:
            type: object
            properties:
              type:
                type: string
                enum: [scheduled]
              at:
                type: string
                format: date-time

  - title: "Detach ramp schedule"
    type: object
    required:
      - mode
      - rampScheduleId
      - ruleId
    properties:
      mode:
        type: string
        enum: [detach]
      rampScheduleId:
        type: string
        description: "ID of the ramp schedule to detach from"
      ruleId:
        type: string
        description: "Rule ID being detached"
      deleteScheduleWhenEmpty:
        type: boolean
        description: "Delete the ramp schedule entirely if no targets remain after detach"

discriminator:
  propertyName: mode
