description: |
  Common fields shared by all feature rule types. Specific rule types extend
  this base with their own required properties (value, coverage, etc.).
type: object
required:
  - description
  - id
  - enabled
properties:
  description:
    type: string
  condition:
    type: string
  id:
    type: string
  enabled:
    type: boolean
  scheduleRules:
    type: array
    description: "Simple time-based on/off schedule for this rule"
    items:
      $ref: "./ScheduleRule.yaml"
    example:
      - enabled: true
        timestamp: null
      - enabled: false
        timestamp: "2025-06-23T16:09:37.769Z"
  scheduleType:
    type: string
    enum: ["none", "schedule", "ramp"]
    description: |
      UI hint for which scheduling mode is active:
      - `none` – no schedule
      - `schedule` – simple time-based enable/disable via `scheduleRules`
      - `ramp` – multi-step ramp-up controlled by an associated RampSchedule document
  savedGroupTargeting:
    type: array
    items:
      type: object
      required:
        - matchType
        - savedGroups
      properties:
        matchType:
          type: string
          enum:
            - "all"
            - "any"
            - "none"
        savedGroups:
          type: array
          items:
            type: string
  prerequisites:
    type: array
    items:
      type: object
      required:
        - id
        - condition
      properties:
        id:
          type: string
          description: "Feature ID of the prerequisite"
        condition:
          type: string
