type: object
required:
  - metricId
  - overrides
properties:
  metricId:
    type: string
  overrides:
    type: object
    properties:
      delayHours:
        type: number
      windowHours:
        type: number
      window:
        type: string
        enum:
          - "conversion"
          - "lookback"
          - ""
      winRiskThreshold:
        deprecated: true
        type: number
      loseRiskThreshold:
        deprecated: true
        type: number
      properPriorOverride:
        type: boolean
      properPriorEnabled:
        type: boolean
      properPriorMean:
        type: number
      properPriorStdDev:
        type: number
      regressionAdjustmentOverride:
        type: boolean
      regressionAdjustmentEnabled:
        type: boolean
      regressionAdjustmentDays:
        type: number
