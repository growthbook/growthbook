type: object
required:
  - id
  - organization
  - dateCreated
  - dateUpdated
  - name
  - entityType
  - entityId
  - targets
  - steps
  - status
  - currentStepIndex
  - nextStepAt
properties:
  id:
    type: string
    description: "Unique identifier (rs_ prefix)"
  organization:
    type: string
  dateCreated:
    type: string
    format: date-time
  dateUpdated:
    type: string
    format: date-time
  name:
    type: string
  entityType:
    type: string
    enum: ["feature"]
  entityId:
    type: string
  targets:
    type: array
    description: "Controlled entity references"
    items:
      type: object
      required:
        - id
        - entityType
        - entityId
        - status
      properties:
        id:
          type: string
        entityType:
          type: string
          enum: ["feature"]
        entityId:
          type: string
        ruleId:
          type: string
        environment:
          type: string
        status:
          type: string
          enum: ["pending-join", "active"]
        activatingRevisionVersion:
          type: integer
          description: "Feature revision version that activates this ramp; cleared once published"
  endActions:
    type: array
    description: "Actions applied on top of all step patches when the ramp completes. Represents the final desired rule state."
    items:
      type: object
      required:
        - targetType
        - targetId
        - patch
      properties:
        targetType:
          enum: ["feature-rule"]
        targetId:
          type: string
        patch:
          type: object
          required:
            - ruleId
          properties:
            ruleId:
              type: string
            coverage:
              type: number
              minimum: 0
              maximum: 1
            condition:
              type: string
            force:
              description: "Force value (any JSON type)"
  steps:
    type: array
    description: "Ordered ramp steps"
    items:
      type: object
      required:
        - trigger
        - actions
      properties:
        trigger:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum: ["interval", "approval", "scheduled"]
            seconds:
              type: number
              description: "Hold duration (interval triggers only)"
            at:
              type: string
              format: date-time
              description: "Absolute fire time (scheduled triggers only)"
        actions:
          type: array
          items:
            type: object
            required:
              - targetType
              - targetId
              - patch
            properties:
              targetType:
                enum: ["feature-rule"]
              targetId:
                type: string
              patch:
                type: object
                required:
                  - ruleId
                properties:
                  ruleId:
                    type: string
                  coverage:
                    type: number
                    minimum: 0
                    maximum: 1
                  condition:
                    type: string
                  force:
                    description: "Force value (any JSON type)"
        approvalNotes:
          type: string
  startDate:
    type: string
    format: date-time
    nullable: true
    description: "When the ramp fires. Absent/null means immediately on publish; set to a future datetime to delay start and keep the rule disabled until that time."
  endCondition:
    type: object
    description: "Optional hard deadline for standard (no-step) schedules"
    properties:
      trigger:
        type: object
        properties:
          type:
            type: string
            enum: ["scheduled"]
          at:
            type: string
            format: date-time
  status:
    type: string
    enum:
      - pending
      - ready
      - running
      - paused
      - pending-approval
      - completed
      - rolled-back
  currentStepIndex:
    type: integer
    minimum: -1
    description: "Index of current step; -1 = not yet started"
  startedAt:
    type: string
    format: date-time
  phaseStartedAt:
    type: string
    format: date-time
    description: "Anchor for cumulative interval timing; resets after each approval gate"
  pausedAt:
    type: string
    format: date-time
  nextStepAt:
    type: string
    format: date-time
    nullable: true
    description: "When the next step fires; null for approval steps and terminal states"
  elapsedMs:
    type: integer
    description: "Milliseconds since startedAt (computed at response time, not stored)"
