type: object
required:
  - id
  - dateCreated
  - dateUpdated
  - name
  - type
properties:
  id:
    type: string
  type:
    type: string
    enum:
      - condition
      - list
  dateCreated:
    type: string
    format: date-time
  dateUpdated:
    type: string
    format: date-time
  name:
    type: string
  owner:
    $ref: "../fields/OwnerField.yaml"
  condition:
    description: When type = 'condition', this is the JSON-encoded condition for the group
    type: string
  attributeKey:
    description: When type = 'list', this is the attribute key the group is based on
    type: string
  values:
    description: When type = 'list', this is the list of values for the attribute key
    type: array
    items:
      type: string
  description:
    type: string
  projects:
    type: array
    items:
      type: string
