allOf:
  - $ref: "./FeatureBaseRule.yaml"
  - type: object
    required:
      - type
      - variations
      - experimentId
    properties:
      type:
        type: string
        enum: ["experiment-ref"]
      variations:
        type: array
        items:
          type: object
          required:
            - value
            - variationId
          properties:
            value:
              type: string
            variationId:
              type: string
      experimentId:
        type: string
