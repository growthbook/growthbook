type: object
description: |
  Ramp schedule configuration. `mode`, `ruleId`, and `environment` are inferred from context —
  do not include them. For simple start/end date automation, use the `schedule` shorthand instead.
properties:
  name:
    type: string
    description: "Display name. Defaults to \"Ramp schedule – {Month YYYY}\" if omitted."
  templateId:
    type: string
    description: "Load steps and endActions from a saved template. Explicit `steps`/`endActions` take precedence."
  startDate:
    type: string
    format: date-time
    nullable: true
    description: "When to start the ramp; absent or null means start immediately on publish"
  steps:
    type: array
    description: "Ordered ramp steps. Omit when using `templateId`."
    items:
      type: object
      required:
        - trigger
      properties:
        trigger:
          oneOf:
            - type: object
              required: [type, seconds]
              properties:
                type:
                  type: string
                  enum: [interval]
                seconds:
                  type: number
                  description: "Hold duration in seconds"
            - type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [approval]
            - type: object
              required: [type, at]
              properties:
                type:
                  type: string
                  enum: [scheduled]
                at:
                  type: string
                  format: date-time
          discriminator:
            propertyName: type
        actions:
          type: array
          description: "Patches applied at this step. `targetType` and `targetId` are auto-injected from context."
          items:
            type: object
            required:
              - patch
            properties:
              targetType:
                type: string
                enum: [feature-rule]
                description: "Auto-injected — omit unless overriding."
              targetId:
                type: string
                description: "Auto-injected — omit unless overriding."
              patch:
                type: object
                description: "Sparse rule patch applied at this step."
                properties:
                  coverage:
                    type: number
                    minimum: 0
                    maximum: 1
                    description: "Rollout percent (0–1)"
                  condition:
                    type: string
                    description: "Targeting condition as a JSON string (MongoDB-style)"
                  savedGroups:
                    type: array
                    items:
                      type: object
                      required: [match, ids]
                      properties:
                        match:
                          type: string
                          enum: [all, any, none]
                        ids:
                          type: array
                          items:
                            type: string
                  prerequisites:
                    type: array
                    items:
                      type: object
                      required: [id, condition]
                      properties:
                        id:
                          type: string
                        condition:
                          type: string
                  force:
                    description: "Force value (any JSON type — boolean, string, number, or object)"
                    nullable: true
                  enabled:
                    type: boolean
                    description: "Enable/disable the rule at this step"
        approvalNotes:
          type: string
          nullable: true
  endActions:
    type: array
    description: "Final patches applied when the ramp completes. `targetType` and `targetId` are auto-injected."
    items:
      type: object
      required:
        - patch
      properties:
        targetType:
          type: string
          enum: [feature-rule]
          description: "Auto-injected — omit unless overriding."
        targetId:
          type: string
          description: "Auto-injected — omit unless overriding."
        patch:
          type: object
          properties:
            coverage:
              type: number
              minimum: 0
              maximum: 1
            condition:
              type: string
            savedGroups:
              type: array
              items:
                type: object
                required: [match, ids]
                properties:
                  match:
                    type: string
                    enum: [all, any, none]
                  ids:
                    type: array
                    items:
                      type: string
            prerequisites:
              type: array
              items:
                type: object
                required: [id, condition]
                properties:
                  id:
                    type: string
                  condition:
                    type: string
            force:
              description: "Force value (any JSON type)"
              nullable: true
            enabled:
              type: boolean
  endCondition:
    type: object
    description: "Condition that terminates the ramp when met"
    properties:
      trigger:
        type: object
        properties:
          type:
            type: string
            enum: [scheduled]
          at:
            type: string
            format: date-time
