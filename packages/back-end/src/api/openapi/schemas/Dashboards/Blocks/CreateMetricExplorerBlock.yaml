allOf:
  - $ref: "./BaseBlock.yaml"
  - type: object
    required:
      - type
      - factMetricId
      - analysisSettings
      - visualizationType
      - valueType
      - metricAnalysisId
    properties:
      type:
        type: string
        enum:
          - "metric-explorer"
      factMetricId:
        type: string
      analysisSettings:
        type: object
        required:
          - userIdType
          - startDate
          - endDate
          - lookbackDays
          - populationType
          - populationId
        properties:
          userIdType:
            type: string
          startDate:
            type: string
            format: date-time
          endDate:
            type: string
            format: date-time
          lookbackDays:
            type: number
          populationType:
            type: string
            enum:
              - metric
              - factTable
              - exposureQuery
              - population
              - segment
          populationId:
            type: string
            nullable: true
      visualizationType:
        type: string
        enum:
          - histogram
          - bigNumber
          - timeseries
      valueType:
        type: string
        enum:
          - avg
          - sum
      metricAnalysisId:
        type: string