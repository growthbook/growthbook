allOf:
  - $ref: "./BaseBlock.yaml"
  - $ref: "./BlockWithMetricSlices.yaml"
  - type: object
    required:
      - type
      - experimentId
      - metricSelector
      - variationIds
      - snapshotId
    properties:
      type:
        type: string
        enum:
          - "experiment-time-series"
      experimentId:
        type: string
      metricSelector:
        type: string
        enum:
          - experiment-goal
          - experiment-secondary
          - experiment-guardrail
          - custom
      metricIds:
        type: array
        items:
          type: string
      variationIds:
        type: array
        items:
          type: string
      snapshotId:
        type: string
