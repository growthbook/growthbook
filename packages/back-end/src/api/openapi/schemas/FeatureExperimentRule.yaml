allOf:
  - $ref: "./FeatureBaseRule.yaml"
  - type: object
    required:
      - type
    properties:
      type:
        type: string
        enum: ["experiment"]
      trackingKey:
        type: string
      hashAttribute:
        type: string
      fallbackAttribute:
        type: string
      disableStickyBucketing:
        type: boolean
      bucketVersion:
        type: number
      minBucketVersion:
        type: number
      namespace:
        type: object
        required:
          - enabled
          - name
          - range
        properties:
          enabled:
            type: boolean
          name:
            type: string
          range:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
      coverage:
        type: number
        minimum: 0
        maximum: 1
      value:
        type: array
        description: "Variation values with weights"
        items:
          type: object
          required:
            - value
            - weight
          properties:
            value:
              type: string
            weight:
              type: number
            name:
              type: string
