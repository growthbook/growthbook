type: object
required:
  - featureId
  - version
  - dateCreated
  - dateUpdated
  - createdBy
  - status
  - comment
  - baseVersion
  - defaultValue
  - rules
properties:
  featureId:
    type: string
  version:
    type: number
  dateCreated:
    type: string
    format: date-time
  dateUpdated:
    type: string
    format: date-time
  datePublished:
    type: string
    format: date-time
    nullable: true
  createdBy:
    type: object
    description: "User who created this revision"
  publishedBy:
    type: object
    nullable: true
    description: "User who published this revision"
  status:
    type: string
    enum:
      - draft
      - published
      - discarded
      - approved
      - changes-requested
      - pending-review
      - pending-parent
  comment:
    type: string
    description: "Internal note attached to the revision"
  title:
    type: string
    description: "Short display title for the draft"
  baseVersion:
    type: number
    description: "Version this draft was branched from"
  defaultValue:
    type: string
  rules:
    type: object
    description: "Map of environment id → rule array for this revision"
    additionalProperties:
      type: array
      items:
        $ref: "./FeatureRule.yaml"
  environmentsEnabled:
    type: object
    additionalProperties:
      type: boolean
  prerequisites:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        condition:
          type: string
  archived:
    type: boolean
  metadata:
    type: object
    description: "Feature-level metadata snapshot at time of draft"
  holdout:
    type: object
    nullable: true
    properties:
      id:
        type: string
      value:
        type: string
  contributors:
    type: array
    description: "Users who have edited this draft"
    items:
      type: object
  rampActions:
    type: array
    description: "Pending ramp schedule actions to execute when this revision is published"
    items:
      $ref: "./RevisionRampAction.yaml"
