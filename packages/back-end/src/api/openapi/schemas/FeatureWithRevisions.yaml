allOf:
  - $ref: "./Feature.yaml"
  - type: object
    properties:
      revisions:
        type: array
        items:
          type: object
          required:
            - baseVersion
            - version
            - comment
            - date
            - status
            - rules
          properties:
            baseVersion:
              type: integer
            version:
              type: integer
            comment:
              type: string
            date:
              type: string
              format: date-time
            status:
              type: string
            createdBy:
              type: string
            publishedBy:
              type: string
            defaultValue:
              type: string
              description: "The default value at the time this revision was created"
            rules:
              type: object
              additionalProperties:
                type: array
                items:
                  $ref: "./FeatureRule.yaml"
            definitions:
              type: object
              additionalProperties:
                type: string
                description: "A JSON stringified [FeatureDefinition](#tag/FeatureDefinition_model)"
            environmentsEnabled:
              type: object
              additionalProperties:
                type: boolean
            prerequisites:
              type: array
              items:
                type: object
                required:
                  - id
                  - condition
                properties:
                  id:
                    type: string
                  condition:
                    type: string
            metadata:
              type: object
              properties:
                description:
                  type: string
                owner:
                  type: string
                project:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                neverStale:
                  type: boolean
                valueType:
                  type: string
                jsonSchema:
                  type: object
                  properties:
                    schemaType:
                      type: string
                      enum: ["schema", "simple"]
                    schema:
                      type: string
                    simple:
                      type: object
                      additionalProperties: true
                    date:
                      type: string
                      format: date-time
                    enabled:
                      type: boolean
                customFields:
                  type: object
                  additionalProperties: true
