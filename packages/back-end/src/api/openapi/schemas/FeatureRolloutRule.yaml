allOf:
  - $ref: "./FeatureBaseRule.yaml"
  - type: object
    required:
      - type
      - value
      - coverage
      - hashAttribute
    properties:
      type:
        type: string
        enum: ["rollout"]
      value:
        type: string
      coverage:
        type: number
        minimum: 0
        maximum: 1
      hashAttribute:
        type: string
      seed:
        type: string
        description: "Optional seed for the hash function; defaults to the rule id"
