type: object
required:
  - datasourceId
  - assignmentQueryId
  - experimentId
  - segmentId
  - queryFilter
  - inProgressConversions
  - attributionModel
  - statsEngine
  - goals
  - secondaryMetrics
  - guardrails
properties:
  datasourceId:
    type: string
  assignmentQueryId:
    type: string
  experimentId:
    type: string
  segmentId:
    type: string
  queryFilter:
    type: string
  inProgressConversions:
    enum:
      - include
      - exclude
  attributionModel:
    enum:
      - firstExposure
      - experimentDuration
      - lookbackOverride
    description: Setting attribution model to `"experimentDuration"` is the same as selecting "Ignore Conversion Windows" for the Conversion Window Override. Setting it to `"lookbackOverride"` requires a `lookbackOverride` object to be provided.
  lookbackOverride:
    $ref: "./LookbackOverride.yaml"
  statsEngine:
    enum:
      - bayesian
      - frequentist
  regressionAdjustmentEnabled:
    type: boolean
  sequentialTestingEnabled:
    type: boolean
  sequentialTestingTuningParameter:
    type: number
  postStratificationEnabled:
    type:
      - boolean
      - "null"
    description: When null, the organization default is used.
  decisionFrameworkSettings:
    $ref: "./ExperimentDecisionFrameworkSettings.yaml"
  metricOverrides:
    type: array
    items:
      $ref: "./ExperimentMetricOverrideEntry.yaml"
    description: >-
      Per-metric analysis overrides; also reflected in goals/secondaryMetrics/guardrails overrides when applicable.
      On create/update, this replaces the entire stored array (it does not patch individual entries).
  goals:
    type: array
    items:
      $ref: "./ExperimentMetric.yaml"
  secondaryMetrics:
    type: array
    items:
      $ref: "./ExperimentMetric.yaml"
  guardrails:
    type: array
    items:
      $ref: "./ExperimentMetric.yaml"
  activationMetric:
    $ref: "./ExperimentMetric.yaml"
