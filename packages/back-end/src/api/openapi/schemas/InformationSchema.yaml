type: object
required:
  - id
  - datasourceId
  - status
  - databases
  - dateCreated
  - dateUpdated
properties:
  id:
    type: string
  datasourceId:
    type: string
  status:
    type: string
    enum:
      - PENDING
      - COMPLETE
  error:
    type: object
    required:
      - errorType
      - message
    properties:
      errorType:
        type: string
        enum:
          - generic
          - not_supported
          - missing_params
      message:
        type: string
  databases:
    type: array
    items:
      type: object
      required:
        - databaseName
        - schemas
        - dateCreated
        - dateUpdated
      properties:
        databaseName:
          type: string
        path:
          type: string
        dateCreated:
          type: string
          format: date-time
        dateUpdated:
          type: string
          format: date-time
        schemas:
          type: array
          items:
            type: object
            required:
              - schemaName
              - tables
              - dateCreated
              - dateUpdated
            properties:
              schemaName:
                type: string
              path:
                type: string
              dateCreated:
                type: string
                format: date-time
              dateUpdated:
                type: string
                format: date-time
              tables:
                type: array
                items:
                  type: object
                  required:
                    - tableName
                    - id
                    - numOfColumns
                    - dateCreated
                    - dateUpdated
                  properties:
                    tableName:
                      type: string
                    path:
                      type: string
                    id:
                      type: string
                    numOfColumns:
                      type: number
                    dateCreated:
                      type: string
                      format: date-time
                    dateUpdated:
                      type: string
                      format: date-time
  dateCreated:
    type: string
    format: date-time
  dateUpdated:
    type: string
    format: date-time
