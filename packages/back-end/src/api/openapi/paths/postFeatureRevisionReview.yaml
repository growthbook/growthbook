summary: Submit a review for a feature revision
description: |
  Combined "submit for review" + "review submission" endpoint. Approves, requests changes on,
  or adds a comment to a feature revision in any status (`draft`, `pending-review`,
  `changes-requested`, or `approved`).

  When called on a `draft` revision with `Approved` or `Requested Changes`, the revision is
  implicitly submitted for review and then immediately moved to the requested status —
  there is no need to call a separate "submit for review" step.

  Reviewers cannot submit a non-comment review on a revision they created. When the org has
  `blockSelfApproval` enabled and the caller is listed in the revision's `contributors`,
  an `Approved` review is rejected.
parameters:
  - $ref: "../parameters.yaml#/id"
  - name: version
    in: path
    required: true
    description: The revision version number
    schema:
      type: integer
tags:
  - features
operationId: postFeatureRevisionReview
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X POST https://api.growthbook.io/api/v1/features/my-feature/revisions/3/review \
        -d '{ "review": "Approved", "comment": "LGTM" }' \
        -u secret_abc123DEF456:
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - review
        properties:
          review:
            type: string
            enum:
              - Approved
              - Requested Changes
              - Comment
          comment:
            type: string
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
