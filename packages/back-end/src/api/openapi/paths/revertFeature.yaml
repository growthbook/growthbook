parameters:
  - $ref: "../parameters.yaml#/id"
post:
  summary: Revert a feature to a specific revision
  description: |
    Publishes the rules and values from a previous revision as the current live state of the feature. Use `strategy: "head"` (default) to promote the target revision directly, or `strategy: "new-revision"` to record the revert as a new revision for a cleaner audit trail.

    Returns 403 if the API key lacks permission or if approval rules are enabled for an affected environment and the org setting "REST API always bypasses approval requirements" is off.
  tags:
    - features
  operationId: revertFeature
  x-codeSamples:
    - lang: 'cURL'
      source: |
        curl -X POST https://api.growthbook.io/api/v1/features/my-feature/revert \
          -d '{ "revision": 3, "comment": "Bug found" }' \
          -u secret_abc123DEF456:
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              type: number
            comment:
              type: string
            strategy:
              type: string
              enum:
                - head
                - new-revision
              default: head
              description: |
                Controls how the revert is recorded.
                `head` (default) re-applies the target revision directly as the new HEAD — the revision history shows the old revision promoted.
                `new-revision` creates a fresh revision whose values match the target, leaving a clear audit trail of the revert action.
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - feature
            properties:
              feature:
                $ref: "../schemas/Feature.yaml"
