parameters:
  - in: query
    name: cache
    required: false
    schema:
      type: string
      enum:
        - preferred
        - required
        - never
    description: |
      Controls cache behavior for this exploration:
      - `preferred` (default): return a cached result if one exists, otherwise run a new query
      - `never`: always run a new query, ignoring any cached results
      - `required`: only return a cached result; if none exists, returns `exploration: null` with a message
tags:
  - product-analytics
summary: Create a Data Source based visualization
operationId: postDataSourceExploration
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X POST https://api.growthbook.io/api/v1/product-analytics/data-source-exploration \
        -H 'Content-Type: application/json' \
        -d '{"datasource":"ds_abc123","chartType":"line","dateRange":{"predefined":"last30Days","lookbackValue":null,"lookbackUnit":null,"startDate":null,"endDate":null},"dimensions":[{"dimensionType":"date","column":"created_at","dateGranularity":"day"}],"dataset":{"type":"data_source","table":"orders","path":"public.orders","timestampColumn":"created_at","columnTypes":{"user_id":"string","amount":"number","created_at":"date"},"values":[{"type":"data_source","name":"Orders","rowFilters":[],"valueType":"unit_count","valueColumn":null,"unit":null}]}}' \
        -u secret_abc123DEF456:
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: "../payload-schemas/PostDataSourceExplorationPayload.yaml"
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - exploration
          properties:
            exploration:
              nullable: true
              allOf:
                - $ref: "../schemas/ProductAnalyticsDataSourceExploration.yaml"
            query:
              nullable: true
              allOf:
                - $ref: "../schemas/Query.yaml"
            message:
              type: string
              description: Present when `exploration` is null, explaining why no result was returned.
