summary: Set prerequisites in a draft revision
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - in: path
    name: version
    required: true
    schema:
      type: integer
    description: "Revision version number"
operationId: putFeatureRevisionPrerequisites
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - prerequisites
        properties:
          prerequisites:
            type: array
            items:
              type: object
              required:
                - id
                - condition
              properties:
                id:
                  type: string
                  description: "Feature ID of the prerequisite"
                condition:
                  type: string
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
