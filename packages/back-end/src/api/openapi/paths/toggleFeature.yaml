parameters:
  - $ref: "../parameters.yaml#/id"
post:
  summary: Toggle a feature in one or more environments
  description: |
    Enables or disables a feature in one or more environments simultaneously. Accepts a map of environment name → boolean and immediately publishes the change.

    Returns 403 if the API key lacks permission or if approval rules are enabled for an affected environment and the org setting "REST API always bypasses approval requirements" is off.

    Pass `adminOverride: true` in the body to bypass approval requirements (requires the "REST API always bypasses approval requirements" org setting).
  tags:
    - features
  operationId: toggleFeature
  x-codeSamples:
    - lang: 'cURL'
      source: |
        curl -X POST https://api.growthbook.io/api/v1/features/my-feature/toggle \
          -d '{ "reason": "Kill switch activated", "environments": { "production": false } }' \
          -u secret_abc123DEF456:
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - environments
          properties:
            reason:
              type: string
            environments:
              type: object
              additionalProperties:
                enum:
                  - true
                  - false
                  - "true"
                  - "false"
                  - "1"
                  - "0"
                  - 1
                  - 0
                  - ""
            adminOverride:
              type: boolean
              default: false
              description: |
                Pass `true` to bypass approval requirements and immediately publish the change.
                Requires the organization setting "REST API always bypasses approval requirements" to be enabled.
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - feature
            properties:
              feature:
                $ref: "../schemas/Feature.yaml"
