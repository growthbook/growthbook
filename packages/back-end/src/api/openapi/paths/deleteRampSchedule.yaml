parameters:
  - $ref: "../parameters.yaml#/id"
summary: Delete a ramp schedule
description: |
  Permanently deletes a ramp schedule. This does not undo any rule patches that
  were already applied by completed steps.
tags:
  - ramp-schedules
operationId: deleteRampSchedule
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X DELETE https://api.growthbook.io/api/v1/ramp-schedules/rs_abc123 \
        -u secret_abc123DEF456:
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - deletedId
          properties:
            deletedId:
              type: string
