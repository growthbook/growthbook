summary: Create a visual changeset for an experiment
tags:
  - visual-changesets
parameters:
  - $ref: "../parameters.yaml#/id"
operationId: postVisualChangesets
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: "../payload-schemas/PostExperimentVisualChangesetPayload.yaml"
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X POST https://api.growthbook.io/api/v1/experiments/exp_123abc/visual-changesets \
        -u secret_abc123DEF456: \
        -H "Content-Type: application/json" \
        -d '{"editorUrl":"https://example.com/","urlPatterns":[{"type":"simple","pattern":"/","include":true}]}'
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - visualChangeset
          properties:
            visualChangeset:
              $ref: "../schemas/VisualChangeset.yaml"
