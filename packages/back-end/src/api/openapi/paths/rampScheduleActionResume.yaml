parameters:
  - $ref: "../parameters.yaml#/id"
post:
  summary: Resume a paused ramp schedule
  description: |
    Resumes a `paused` schedule. Adjusts timing anchors to account for the
    pause duration so step intervals continue from where they left off.
  tags:
    - ramp-schedules
  operationId: resumeRampSchedule
  x-codeSamples:
    - lang: "cURL"
      source: |
        curl -X POST https://api.growthbook.io/api/v1/ramp-schedules/rs_abc123/actions/resume \
          -u secret_abc123DEF456:
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - rampSchedule
            properties:
              rampSchedule:
                $ref: "../schemas/RampSchedule.yaml"
