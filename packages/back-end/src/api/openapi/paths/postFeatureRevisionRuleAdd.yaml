summary: Add a rule to a draft revision
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - in: path
    name: version
    required: true
    schema:
      type: integer
    description: "Revision version number"
operationId: postFeatureRevisionRuleAdd
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - environment
          - rule
        properties:
          environment:
            type: string
          rule:
            description: |
              Rule to add. For force/rollout rules `type` is optional and inferred from rollout percent (`coverage`):
              `coverage < 1` → rollout (requires `hashAttribute`); otherwise → force.
              Use `experiment-ref` to link an existing experiment or bandit by ID.
              `description` is optional and defaults to `""`. The server always generates the rule ID.
            oneOf:
              - title: "Force / Rollout rule"
                type: object
                required:
                  - value
                properties:
                  type:
                    type: string
                    enum: [force, rollout]
                    description: "Optional — inferred from coverage when omitted"
                  value:
                    type: string
                  coverage:
                    type: number
                    minimum: 0
                    maximum: 1
                    description: "Rollout Percent (0–1). Values < 1 trigger rollout inference and require hashAttribute"
                  hashAttribute:
                    type: string
                  seed:
                    type: string
                  description:
                    type: string
                  enabled:
                    type: boolean
                  condition:
                    type: string
                  savedGroups:
                    type: array
                    items:
                      type: object
                      required: [match, ids]
                      properties:
                        match:
                          type: string
                          enum: [all, none, any]
                        ids:
                          type: array
                          items:
                            type: string
                  prerequisites:
                    type: array
                    items:
                      type: object
                      required: [id, condition]
                      properties:
                        id:
                          type: string
                        condition:
                          type: string
              - title: "Experiment-ref rule"
                description: "Links an existing experiment or bandit by experiment ID"
                type: object
                required:
                  - type
                  - experimentId
                  - variations
                properties:
                  type:
                    type: string
                    enum: [experiment-ref]
                  experimentId:
                    type: string
                    description: "ID of the existing experiment or bandit to link"
                  variations:
                    type: array
                    items:
                      type: object
                      required: [value]
                      properties:
                        variationId:
                          type: string
                          description: "Variation ID from the linked experiment. If omitted, values are mapped to variations by index order."
                        value:
                          type: string
              - title: "Safe-rollout rule"
                type: object
                required:
                  - type
                  - controlValue
                  - variationValue
                  - safeRolloutId
                  - hashAttribute
                  - trackingKey
                  - seed
                properties:
                  type:
                    type: string
                    enum: [safe-rollout]
                  controlValue:
                    type: string
                  variationValue:
                    type: string
                  safeRolloutId:
                    type: string
                  hashAttribute:
                    type: string
                  trackingKey:
                    type: string
                  seed:
                    type: string
          rampAction:
            $ref: "../schemas/RevisionRampAction.yaml"
            description: "Optional ramp schedule action to associate with this rule (create or detach)"
          schedule:
            type: object
            description: |
              Simple date-based schedule shorthand. Preferred over setting `rule.scheduleRules`.
              Ignored when `rampAction` is also provided.
              - `startDate` — enables the rule at this time (rule is initially set to disabled)
              - `endDate` — disables the rule at this time
              A ramp schedule is created automatically with `ruleId` and `environment` inferred from context.
            properties:
              startDate:
                type: string
                format: date-time
                nullable: true
              endDate:
                type: string
                format: date-time
                nullable: true
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
