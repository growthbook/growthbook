summary: Update a rule in a draft revision
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
  - in: path
    name: version
    required: true
    schema:
      type: integer
  - in: path
    name: ruleId
    required: true
    schema:
      type: string
operationId: putFeatureRevisionRule
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - environment
          - rule
        properties:
          environment:
            type: string
          rule:
            $ref: "../payload-schemas/postFeature/FeatureRule.yaml"
            description: "Full replacement rule (same types accepted by postFeature/updateFeature — force, rollout, experiment-ref, safe-rollout; legacy experiment type not accepted)"
          rampAction:
            $ref: "../schemas/RevisionRampAction.yaml"
            description: "Optional ramp schedule action to associate with this rule"
          schedule:
            type: object
            description: |
              Simple date-based schedule shorthand. Preferred over setting `rule.scheduleRules` directly.
              Ignored when `rampAction` is also provided.
              - `startDate` — enables the rule at this time (rule is set to disabled until then)
              - `endDate` — disables the rule at this time
              If the existing rule already uses legacy `scheduleRules`, those are updated in-place
              instead of creating a ramp schedule.
            properties:
              startDate:
                type: string
                format: date-time
                nullable: true
              endDate:
                type: string
                format: date-time
                nullable: true
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
