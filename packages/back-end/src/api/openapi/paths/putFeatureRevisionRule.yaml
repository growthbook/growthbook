summary: Update a rule in a draft revision
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
  - in: path
    name: version
    required: true
    schema:
      type: integer
  - in: path
    name: ruleId
    required: true
    schema:
      type: string
operationId: putFeatureRevisionRule
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - environment
          - rule
        properties:
          environment:
            type: string
          rule:
            description: |
              Full replacement for the rule identified by `:ruleId`. Accepted types: `force`, `rollout`, `experiment-ref`, `safe-rollout`.

              **Note:** this endpoint uses the internal rule format (as returned by GET revision/feature endpoints).
              Saved group targeting uses `savedGroups` (array of `{match, ids}` objects) rather than the
              `savedGroupTargeting` / `{matchType, savedGroups}` shape used by `postFeature`/`updateFeature`.

              **Targeting fields (applies to all rule types):**
              - `condition` â€” JSON string using MongoDB-style query syntax against user attributes.
                Omit or pass `""` to match everyone.
                Examples: `{"country": "US"}` Â· `{"plan": {"$in": ["pro","enterprise"]}}`
              - `savedGroups` â€” array of `{match: "all"|"any"|"none", ids: string[]}`.
                `match: "all"` = user in all groups; `"any"` = at least one; `"none"` = not in any.
              - `prerequisites` â€” array of `{id: string, condition: string}`.
                `id` is a feature flag ID; `condition` is a JSON string checked against `{"value": <flag_value>}`.
                Examples: `{"value": true}` Â· `{"value": {"$in": ["a","b"]}}`
            $ref: "../payload-schemas/postFeature/FeatureRule.yaml"
          rampAction:
            $ref: "../schemas/RevisionRampAction.yaml"
            description: "Optional ramp schedule action to associate with this rule"
          schedule:
            type: object
            description: |
              Simple date-based schedule shorthand. Preferred over setting `rule.scheduleRules` directly.
              Ignored when `rampAction` is also provided.
              - `startDate` â€” enables the rule at this time (rule is set to disabled until then)
              - `endDate` â€” disables the rule at this time
              If the existing rule already uses legacy `scheduleRules`, those are updated in-place
              instead of creating a ramp schedule.
            properties:
              startDate:
                type: string
                format: date-time
                nullable: true
              endDate:
                type: string
                format: date-time
                nullable: true
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
