summary: Update a rule in a draft revision
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
  - in: path
    name: version
    required: true
    schema:
      type: integer
  - in: path
    name: ruleId
    required: true
    schema:
      type: string
    description: "Must match `rule.id` in the request body"
operationId: putFeatureRevisionRule
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - environment
          - rule
        properties:
          environment:
            type: string
          rule:
            description: |
              Full replacement for the rule identified by `:ruleId`. The `id` field must match the `:ruleId`
              path parameter. Accepted types: `force`, `rollout`, `experiment-ref`, `safe-rollout`.

              This endpoint uses the **internal** rule format (matching what GET revision endpoints return).
              Saved-group targeting uses `savedGroups: [{match, ids}]` — **not** the
              `savedGroupTargeting: [{matchType, savedGroups}]` shape used by `postFeature`/`updateFeature`.

              **Targeting fields** (all rule types):
              - `condition` — JSON string, MongoDB-style query syntax. Omit or pass `""` to match everyone.
                Example: `{"country": "US"}` · `{"plan": {"$in": ["pro","enterprise"]}}`
              - `savedGroups` — array of `{match: "all"|"any"|"none", ids: string[]}`.
              - `prerequisites` — array of `{id: string, condition: string}` where `condition` is
                evaluated against `{"value": <flag_value>}`. Example: `{"value": true}`
            oneOf:
              - title: "Force rule"
                type: object
                required: [id, type, value]
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum: [force]
                  value:
                    type: string
                  description:
                    type: string
                  enabled:
                    type: boolean
                  condition:
                    type: string
                  savedGroups:
                    type: array
                    items:
                      type: object
                      required: [match, ids]
                      properties:
                        match:
                          type: string
                          enum: [all, any, none]
                        ids:
                          type: array
                          items:
                            type: string
                  prerequisites:
                    type: array
                    items:
                      type: object
                      required: [id, condition]
                      properties:
                        id:
                          type: string
                        condition:
                          type: string
              - title: "Rollout rule"
                type: object
                required: [id, type, value, coverage, hashAttribute]
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum: [rollout]
                  value:
                    type: string
                  coverage:
                    type: number
                    description: "Rollout Percent (0–1)"
                  hashAttribute:
                    type: string
                  seed:
                    type: string
                  description:
                    type: string
                  enabled:
                    type: boolean
                  condition:
                    type: string
                  savedGroups:
                    type: array
                    items:
                      type: object
                      required: [match, ids]
                      properties:
                        match:
                          type: string
                          enum: [all, any, none]
                        ids:
                          type: array
                          items:
                            type: string
                  prerequisites:
                    type: array
                    items:
                      type: object
                      required: [id, condition]
                      properties:
                        id:
                          type: string
                        condition:
                          type: string
              - title: "Experiment-ref rule"
                type: object
                required: [id, type, experimentId, variations]
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum: [experiment-ref]
                  experimentId:
                    type: string
                  variations:
                    type: array
                    items:
                      type: object
                      required: [variationId, value]
                      properties:
                        variationId:
                          type: string
                        value:
                          type: string
                  description:
                    type: string
                  enabled:
                    type: boolean
                  condition:
                    type: string
                  savedGroups:
                    type: array
                    items:
                      type: object
                      required: [match, ids]
                      properties:
                        match:
                          type: string
                          enum: [all, any, none]
                        ids:
                          type: array
                          items:
                            type: string
                  prerequisites:
                    type: array
                    items:
                      type: object
                      required: [id, condition]
                      properties:
                        id:
                          type: string
                        condition:
                          type: string
              - title: "Safe-rollout rule"
                type: object
                required: [id, type, controlValue, variationValue, safeRolloutId, hashAttribute, trackingKey, seed]
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum: [safe-rollout]
                  controlValue:
                    type: string
                  variationValue:
                    type: string
                  safeRolloutId:
                    type: string
                  hashAttribute:
                    type: string
                  trackingKey:
                    type: string
                  seed:
                    type: string
                  description:
                    type: string
                  enabled:
                    type: boolean
                  condition:
                    type: string
                  savedGroups:
                    type: array
                    items:
                      type: object
                      required: [match, ids]
                      properties:
                        match:
                          type: string
                          enum: [all, any, none]
                        ids:
                          type: array
                          items:
                            type: string
          rampAction:
            $ref: "../schemas/RevisionRampAction.yaml"
            description: "Optional ramp schedule action to associate with this rule"
          schedule:
            type: object
            description: |
              Simple date-based schedule shorthand. Preferred over setting `rule.scheduleRules` directly.
              Ignored when `rampAction` is also provided.
              - `startDate` — enables the rule at this time (rule is set to disabled until then)
              - `endDate` — disables the rule at this time
              If the existing rule already uses legacy `scheduleRules`, those are updated in-place
              instead of creating a ramp schedule.
            properties:
              startDate:
                type: string
                format: date-time
                nullable: true
              endDate:
                type: string
                format: date-time
                nullable: true
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
