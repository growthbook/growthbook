parameters:
  - $ref: "../parameters.yaml#/id"
post:
  summary: Remove a target rule from a ramp schedule
  description: |
    Detaches a target rule from this ramp schedule. Identify the target either
    by its `targetId` or by the `[ruleId, environment]` pair.

    If this is the last target on the schedule, the schedule is deleted entirely
    and the response contains `deleted: true` instead of `rampSchedule`.
  tags:
    - ramp-schedules
  operationId: ejectTargetRampSchedule
  x-codeSamples:
    - lang: "cURL"
      source: |
        curl -X POST https://api.growthbook.io/api/v1/ramp-schedules/rs_abc123/actions/eject-target \
          -d '{ "ruleId": "rule_abc", "environment": "production" }' \
          -u secret_abc123DEF456:
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            targetId:
              type: string
              description: "Target ID (from the targets array)"
            ruleId:
              type: string
              description: "Rule ID — use with environment as an alternative to targetId"
            environment:
              type: string
              description: "Environment — use with ruleId as an alternative to targetId"
  responses:
    "200":
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                required:
                  - rampSchedule
                properties:
                  rampSchedule:
                    $ref: "../schemas/RampSchedule.yaml"
              - type: object
                required:
                  - deleted
                  - rampScheduleId
                properties:
                  deleted:
                    type: boolean
                  rampScheduleId:
                    type: string
