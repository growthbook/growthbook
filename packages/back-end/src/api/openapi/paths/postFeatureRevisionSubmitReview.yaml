summary: Submit a review
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - in: path
    name: version
    required: true
    schema:
      type: integer
    description: "Revision version number"
operationId: postFeatureRevisionSubmitReview
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - action
        properties:
          action:
            type: string
            enum:
              - approve
              - request-changes
              - comment
            default: comment
          comment:
            type: string
            default: ""
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
