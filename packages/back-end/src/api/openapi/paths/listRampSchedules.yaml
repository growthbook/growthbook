summary: List ramp schedules
description: |
  Returns all ramp schedules for the organization, with optional filters.
tags:
  - ramp-schedules
parameters:
  - $ref: "../parameters.yaml#/limit"
  - $ref: "../parameters.yaml#/offset"
  - in: query
    name: featureId
    schema:
      type: string
    description: "Filter to schedules attached to a specific feature"
  - in: query
    name: project
    schema:
      type: string
    description: "Filter to schedules attached to features in a specific project"
  - in: query
    name: ruleId
    schema:
      type: string
    description: "Filter to schedules that target a specific rule ID"
  - in: query
    name: environment
    schema:
      type: string
    description: "Filter to schedules that target a specific environment (use with ruleId for exact targeting)"
  - in: query
    name: status
    schema:
      type: string
      enum:
        - pending
        - ready
        - running
        - paused
        - pending-approval
        - completed
        - rolled-back
    description: "Filter by schedule status"
operationId: listRampSchedules
x-codeSamples:
  - lang: "cURL"
    source: |
      curl https://api.growthbook.io/api/v1/ramp-schedules \
        -u secret_abc123DEF456:
responses:
  "200":
    content:
      application/json:
        schema:
          allOf:
            - type: object
              required:
                - rampSchedules
              properties:
                rampSchedules:
                  type: array
                  items:
                    $ref: "../schemas/RampSchedule.yaml"
            - $ref: "../schemas/PaginationFields.yaml"
