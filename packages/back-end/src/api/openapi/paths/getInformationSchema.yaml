parameters:
  - $ref: "../parameters.yaml#/dataSourceId"
get:
  tags:
    - data-sources
  summary: Get a Data Source's Information Schema
  description: Returns cached database schema metadata for a data source, including databases, schemas, and tables. The information schema is automatically created when a SQL-based data source is added. Not all data source types support information schemas.
  operationId: getInformationSchema
  x-codeSamples:
    - lang: "cURL"
      source: |
        curl https://api.growthbook.io/api/v1/data-sources/ds_123abc/information-schema \
          -u secret_abc123DEF456:
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - informationSchema
            properties:
              informationSchema:
                $ref: "../schemas/InformationSchema.yaml"
