summary: Rebase a draft revision
description: |
  Resolves merge conflicts using per-field resolutions and rebases the draft onto the current live version.
  Provide an empty `conflictResolutions` object (or omit it) to auto-merge where possible.
  If any conflicts remain unresolved, a 409 is returned with a `conflicts` array containing each
  unresolved conflict key. Pass those keys back in `conflictResolutions` as `"overwrite"` (keep your
  draft change) or `"discard"` (take the live value).
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - in: path
    name: version
    required: true
    schema:
      type: integer
    description: "Revision version number"
operationId: postFeatureRevisionRebase
requestBody:
  required: false
  content:
    application/json:
      schema:
        type: object
        properties:
          conflictResolutions:
            type: object
            description: |
              Map of conflict key → resolution strategy. Keys come from the `conflicts` array
              in the 409 response. Omit or pass an empty object for the first attempt (auto-merge).
            additionalProperties:
              type: string
              enum:
                - overwrite
                - discard
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
