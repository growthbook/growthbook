parameters:
  - $ref: "../parameters.yaml#/id"
  - name: variationId
    in: path
    required: true
    description: The variation ID (e.g. var_abc123) from the experiment's variations
    schema:
      type: string
post:
  tags:
    - experiments
  summary: Upload a variation screenshot
  operationId: postVariationImageUpload
  x-codeSamples:
    - lang: "cURL"
      source: |
        curl -X POST https://api.growthbook.io/api/v1/experiments/exp_1234/variation/var_abc123/screenshot/upload \
          -H "Content-Type: application/json" \
          -d '{"screenshot":"<base64-encoded-screenshot>","contentType":"image/png"}' \
          -u secret_abc123DEF456:
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../payload-schemas/PostVariationImageUploadPayload.yaml"
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - screenshot
            properties:
              screenshot:
                type: object
                required:
                  - path
                  - description
                properties:
                  path:
                    type: string
                    description: URL or path to the uploaded screenshot
                  description:
                    type: string
                    description: Description of the screenshot
