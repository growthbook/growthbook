parameters:
  - $ref: "../parameters.yaml#/id"
summary: Update a ramp schedule
description: |
  Updates the name, steps, endActions, startDate, or endCondition of a ramp schedule.

  Only allowed when the schedule is in `pending`, `ready`, or `paused` status.

  **targetId shorthand**: When providing `steps` or `endActions`, you may omit `targetId`
  (or pass `"t1"`) in each action. If the schedule has exactly one active target, the server
  will resolve it automatically. For schedules with multiple targets, provide the explicit
  target UUID from `targets[].id`.
tags:
  - ramp-schedules
operationId: putRampSchedule
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X PUT https://api.growthbook.io/api/v1/ramp-schedules/rs_abc123 \
        -d '{ "name": "Updated ramp" }' \
        -u secret_abc123DEF456:
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          name:
            type: string
          steps:
            type: array
            items:
              type: object
              required:
                - trigger
              properties:
                trigger:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum: ["interval", "approval", "scheduled"]
                    seconds:
                      type: number
                    at:
                      type: string
                      format: date-time
                actions:
                  type: array
                  items:
                    type: object
                    required:
                      - patch
                    properties:
                      targetType:
                        enum: ["feature-rule"]
                      targetId:
                        type: string
                      patch:
                        type: object
                        required:
                          - ruleId
                        properties:
                          ruleId:
                            type: string
                          coverage:
                            type: number
                            minimum: 0
                            maximum: 1
                            description: "Rollout Percent (0–1)"
                          condition:
                            type: string
                          force:
                            description: "Force value (any JSON type)"
                approvalNotes:
                  type: string
          endActions:
            type: array
            items:
              type: object
              required:
                - patch
              properties:
                targetType:
                  enum: ["feature-rule"]
                targetId:
                  type: string
                patch:
                  type: object
                  required:
                    - ruleId
                  properties:
                    ruleId:
                      type: string
                    coverage:
                      type: number
                      minimum: 0
                      maximum: 1
                      description: "Rollout Percent (0–1)"
                    condition:
                      type: string
                    force:
                      description: "Force value (any JSON type)"
          startDate:
            type: string
            format: date-time
            nullable: true
          endCondition:
            type: object
            nullable: true
            properties:
              trigger:
                type: object
                properties:
                  type:
                    type: string
                    enum: ["scheduled"]
                  at:
                    type: string
                    format: date-time
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - rampSchedule
          properties:
            rampSchedule:
              $ref: "../schemas/RampSchedule.yaml"
