parameters:
  - $ref: "../parameters.yaml#/tableId"
get:
  tags:
    - data-sources
  summary: Get a single Information Schema Table by id
  description: Returns cached metadata for a specific table in the Data Source, including columns and their data types. Not all data source types support information schemas.
  operationId: getInformationSchemaTable
  x-codeSamples:
    - lang: "cURL"
      source: |
        curl https://api.growthbook.io/api/v1/information-schema-tables/ist_123abc \
          -u secret_abc123DEF456:
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - informationSchemaTable
            properties:
              informationSchemaTable:
                $ref: "../schemas/InformationSchemaTable.yaml"
