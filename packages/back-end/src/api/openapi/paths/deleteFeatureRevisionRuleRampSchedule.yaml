summary: Remove ramp schedule from a rule
description: |
  Removes or detaches the ramp schedule associated with a specific rule in a draft revision.

  **Behavior:**
  - If the rule has a **pending ramp schedule create** action on this revision, it is removed.
  - If the rule has a **live ramp schedule**, a detach action is queued. When the revision is
    published, the schedule is detached from this rule (and deleted if no targets remain).
  - If both exist, the pending create is removed and the detach action replaces it.
  - If neither exists, a 404 is returned.

  After publishing, to modify an existing live schedule directly, use `PUT /api/v1/ramp-schedules/{id}`.
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - $ref: "../parameters.yaml#/revisionVersion"
  - in: path
    name: ruleId
    required: true
    schema:
      type: string
    description: "Rule ID"
operationId: deleteFeatureRevisionRuleRampSchedule
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - environment
        properties:
          environment:
            type: string
            description: "Environment the rule lives in"
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
