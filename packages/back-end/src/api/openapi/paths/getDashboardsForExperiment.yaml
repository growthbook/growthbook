parameters:
  - name: experimentId
    in: path
    description: The experiment whose dashboards are being fetched 
    schema:
      type: string
    required: true
tags:
  - dashboards
summary: List the dashboards for a single experiment
operationId: getDashboardsForExperiment
x-codeSamples:
  - lang: 'cURL'
    source: |
      curl https://api.growthbook.io/api/v1/dashboards/by-experiment/exp_123 \
        -u secret_abc123DEF456:
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - dashboards
          properties:
            dashboards:
              type: array
              items:
                $ref: "../schemas/Dashboard.yaml"
