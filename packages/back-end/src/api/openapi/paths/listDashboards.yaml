parameters:
  - name: includeExperimentDashboards
    in: query
    description: Whether to include Experiment Dashboards in the result, default false
    schema:
      type: string
      enum:
        - "true"
        - "false"
      default: "false"
tags:
  - dashboards
summary: List the dashboards for an organization
operationId: listDashboards
x-codeSamples:
  - lang: 'cURL'
    source: |
      curl https://api.growthbook.io/api/v1/dashboards?includeExperimentDashboards=true \
        -u secret_abc123DEF456:
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - dashboards
          properties:
            dashboards:
              type: array
              items:
                $ref: "../schemas/Dashboard.yaml"
