parameters:
  - in: query
    name: cache
    required: false
    schema:
      type: string
      enum:
        - preferred
        - required
        - never
    description: |
      Controls cache behavior for this exploration:
      - `preferred` (default): return a cached result if one exists, otherwise run a new query
      - `never`: always run a new query, ignoring any cached results
      - `required`: only return a cached result; if none exists, returns a 404
tags:
  - product-analytics-explorations
summary: Run a fact table exploration
operationId: postFactTableExploration
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X POST https://api.growthbook.io/api/v1/product-analytics-explorations/fact-table \
        -H 'Content-Type: application/json' \
        -d '{"datasource":"ds_abc123","chartType":"line","dateRange":{"predefined":"last30Days","lookbackValue":null,"lookbackUnit":null,"startDate":null,"endDate":null},"dimensions":[{"dimensionType":"date","column":"date","dateGranularity":"day"}],"dataset":{"type":"fact_table","factTableId":"ft_abc123","values":[{"type":"fact_table","name":"My Value","rowFilters":[],"valueType":"unit_count","valueColumn":null,"unit":null}]}}' \
        -u secret_abc123DEF456:
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: "../payload-schemas/PostFactTableExplorationPayload.yaml"
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - exploration
          properties:
            exploration:
              $ref: "../schemas/ProductAnalyticsFactTableExploration.yaml"
            query:
              nullable: true
              allOf:
                - $ref: "../schemas/Query.yaml"
  "404":
    description: No cached exploration found. Only returned when `cache` is `required`.
    content:
      application/json:
        schema:
          type: object
          required:
            - message
          properties:
            message:
              type: string
