summary: Publish a revision
description: |
  Publishes the revision. Returns 409 if merge conflicts exist — call rebase first to resolve them.

  If the feature requires approval, the revision must be in `approved` status unless the caller can
  bypass review. Bypass is granted by either the organization setting "REST API always bypasses
  approval requirements" or by a role/token that grants `bypassApprovalChecks` on this feature's project.
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - in: path
    name: version
    required: true
    schema:
      type: integer
    description: "Revision version number"
operationId: postFeatureRevisionPublish
requestBody:
  required: false
  content:
    application/json:
      schema:
        type: object
        properties:
          comment:
            type: string
            default: ""
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
