summary: Get all experiment templates
tags:
  - templates
parameters:
  - $ref: "../parameters.yaml#/limit"
  - $ref: "../parameters.yaml#/offset"
  - $ref: "../parameters.yaml#/projectId"
operationId: listTemplates
x-codeSamples:
  - lang: 'cURL'
    source: |
      curl https://api.growthbook.io/api/v1/templates \
        -u secret_abc123DEF456:
responses:
  "200":
    content:
      application/json:
        schema:
          allOf:
            - type: object
              required:
                - templates
              properties:
                templates:
                  type: array
                  items:
                    $ref: "../schemas/Template.yaml"
            - $ref: "../schemas/PaginationFields.yaml"
