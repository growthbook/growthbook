parameters:
  - $ref: "../parameters.yaml#/id"
post:
  summary: Jump to a specific step
  description: |
    Moves the schedule directly to `targetStepIndex` (forward or backward) and
    pauses. Use `-1` to jump to the pre-start position without rolling back rule
    patches.
  tags:
    - ramp-schedules
  operationId: jumpRampSchedule
  x-codeSamples:
    - lang: "cURL"
      source: |
        curl -X POST https://api.growthbook.io/api/v1/ramp-schedules/rs_abc123/actions/jump \
          -d '{ "targetStepIndex": 2 }' \
          -u secret_abc123DEF456:
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - targetStepIndex
          properties:
            targetStepIndex:
              type: integer
              minimum: -1
              description: "Zero-based index of the step to jump to; -1 = pre-start"
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required:
              - rampSchedule
            properties:
              rampSchedule:
                $ref: "../schemas/RampSchedule.yaml"
