summary: Discard a draft revision
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
  - in: path
    name: version
    required: true
    schema:
      type: integer
    description: "Revision version number"
operationId: postFeatureRevisionDiscard
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
