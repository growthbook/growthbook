parameters:
  - in: query
    name: ids
    required: true
    schema:
      type: string
    description: >
      Comma-separated list of feature IDs (URL-encoded if needed).
      Example: `my_feature,another_feature`
summary: Get stale status for one or more features
tags:
  - features
operationId: getFeatureStale
x-codeSamples:
  - lang: "cURL"
    source: |
      curl "https://api.growthbook.io/api/v1/stale-features?ids=my_feature,another_feature" \
        -u secret_abc123DEF456:
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - features
          properties:
            features:
              type: object
              description: Map of feature ID to stale status. Only requested features that were found and readable are included.
              additionalProperties:
                type: object
                required:
                  - featureId
                  - isStale
                  - staleReason
                  - neverStale
                properties:
                  featureId:
                    type: string
                    description: The feature key
                  isStale:
                    type: boolean
                    description: Whether the feature is considered stale overall (all enabled environments are stale). Always false when neverStale is true.
                  staleReason:
                    type: string
                    nullable: true
                    enum:
                      - never-stale
                      - recently-updated
                      - active-draft
                      - has-dependents
                      - no-rules
                      - rules-one-sided
                      - abandoned-draft
                      - toggled-off
                      - active-experiment
                      - has-rules
                    description: >
                      Reason for the feature's stale or non-stale status.
                      `never-stale` when stale detection is disabled.
                      Non-stale reasons: `recently-updated`, `active-draft`, `has-dependents`.
                      Stale reasons: `no-rules`, `rules-one-sided`, `abandoned-draft`, `toggled-off`.
                      Null when non-stale with no single cause (see staleByEnv).
                  neverStale:
                    type: boolean
                    description: When true the feature is permanently excluded from stale detection.
                  staleByEnv:
                    type: object
                    description: Per-environment staleness breakdown, keyed by environment ID. Present when environments exist and neverStale is false.
                    additionalProperties:
                      type: object
                      required:
                        - isStale
                        - reason
                      properties:
                        isStale:
                          type: boolean
                          description: Whether this environment is stale
                        reason:
                          type: string
                          nullable: true
                          enum:
                            - no-rules
                            - rules-one-sided
                            - abandoned-draft
                            - toggled-off
                            - active-experiment
                            - has-rules
                            - recently-updated
                            - active-draft
                            - has-dependents
                          description: Reason for the stale status in this environment
                        evaluatesTo:
                          type: string
                          description: >
                            The deterministic value this feature evaluates to in this environment.
                            Uses the same raw string encoding as `feature.defaultValue`.
                            Only present when the value is deterministic or the environment is toggled off.
