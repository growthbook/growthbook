parameters:
  - $ref: "../parameters.yaml#/id"
  - name: variationId
    in: path
    required: true
    description: The variation ID (e.g. var_abc123) from the experiment's variations
    schema:
      type: string
tags:
  - experiments
summary: Delete a variation screenshot
operationId: deleteVariationScreenshot
x-codeSamples:
  - lang: "cURL"
    source: |
      curl -X DELETE https://api.growthbook.io/api/v1/experiments/exp_1234/variation/var_abc123/screenshot \
        -H "Content-Type: application/json" \
        -d '{"path":"/upload/org_xxx/2025-03/img_uuid.png"}' \
        -u secret_abc123DEF456:
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - path
        properties:
          path:
            type: string
            description: The screenshot path/URL to delete (from upload response)
responses:
  "200":
    description: Screenshot deleted successfully
    content:
      application/json:
        schema:
          type: object
