summary: Get most recent active draft revision
description: |
  Returns the most recently updated active draft revision for a feature.
  Useful when you want to operate on "the current draft" without needing to look up the version first.

  Active draft statuses: `draft`, `pending-review`, `changes-requested`, `approved`.

  Returns 404 if no active draft exists for this feature.
tags:
  - feature-revisions
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: "Feature ID"
operationId: getFeatureRevisionLatest
responses:
  "200":
    content:
      application/json:
        schema:
          type: object
          required:
            - revision
          properties:
            revision:
              $ref: "../schemas/FeatureRevision.yaml"
