# Default values for growthbook.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  env:
    - name: APP_ORIGIN
      # full URL of your frontend, e.g. https://gb.example.com
      value: https://growthbook.local

frontend:
  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  # fsGroup makes the writable volumes (uploads PVC, emptyDirs) group-owned by
  # 1000 so the non-root (uid 1000) runtime can write them. Without it, a freshly
  # provisioned PVC is root-owned and uploads fail at runtime.
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  service:
    port: 3000
  # The hardened image is distroless (no shell), so launch pm2-runtime via node
  # directly — its node_modules/.bin shim is #!/bin/sh and won't exec. --only
  # runs just this pod's app.
  command: [/usr/local/bin/node, node_modules/pm2/bin/pm2-runtime, start, ecosystem.config.js, --only, front-end]
  args: []
  # readOnlyRootFilesystem requires writable mounts for the paths the front-end
  # writes at runtime: /tmp and Next.js's on-disk cache.
  volumes:
    - name: tmp
      emptyDir: {}
    - name: next-cache
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: next-cache
      mountPath: /usr/local/src/app/packages/front-end/.next/cache
  env:
    - name: API_HOST
      # full URL of your backend, e.g. https://gb-api.example.com
      value: https://api.growthbook.local

backend:
  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  # fsGroup makes the writable volumes (uploads PVC, emptyDirs) group-owned by
  # 1000 so the non-root (uid 1000) runtime can write them. Without it, a freshly
  # provisioned PVC is root-owned and uploads fail at runtime.
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  service:
    port: 3100
  mongodbEnabled: true
  # can be disabled when using UPLOAD_METHOD "s3" or "google-cloud"
  volumeClaim:
    enabled: true
  # readOnlyRootFilesystem requires a writable /tmp. The uploads dir is mounted
  # separately via volumeClaim above (when UPLOAD_METHOD is local).
  volumes:
    - name: tmp
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp
  # For use when providing an existing MongoDB instance
  # mongodbUri:
  # The hardened image is distroless (no shell), so launch pm2-runtime via node
  # directly — its node_modules/.bin shim is #!/bin/sh and won't exec. --only
  # runs just this pod's app.
  command: [/usr/local/bin/node, node_modules/pm2/bin/pm2-runtime, start, ecosystem.config.js, --only, back-end]
  # To enable tracing set TRACING_PROVIDER env var to "datadog" or "opentelemetry"
  args: []
  # Reference: https://docs.growthbook.io/self-host/env
  env:
    # generate random values with: "openssl rand -hex 32"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name:
          key:
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name:
          key:

    # ===== License configuration =====
    # - name: LICENSE_KEY
    #   valueFrom:
    #     secretKeyRef:
    #       name:
    #       key:

    # ===== E-Mail configuration =====
    - name: EMAIL_ENABLED
      value: "false"
    # - name: EMAIL_HOST
    #   value: ""
    # - name: EMAIL_PORT
    #   value: ""
    # - name: EMAIL_HOST_USER
    #   value: ""
    # - name: EMAIL_HOST_PASSWORD
    #   value: ""
    # - name: EMAIL_FROM
    #   value: ""

    # ===== Uploads configuration =====
    # Possible values: local, s3, google-cloud
    - name: UPLOAD_METHOD
      value: local

    # ===== S3 uploads configuration =====
    # - name: S3_BUCKET
    #   value: ""
    # default: us-east-1
    # - name: S3_REGION
    #   value: ""
    # default: https://${S3_BUCKET}.s3.amazonaws.com/
    # - name: S3_DOMAIN
    #   value: ""
    # not required when deployed to AWS with an instance role
    # - name: AWS_ACCESS_KEY_ID
    #   valueFrom:
    #     secretKeyRef:
    #       name: ""
    #       key: ""
    # not required when deployed to AWS with an instance role
    # - name: AWS_SECRET_ACCESS_KEY
    #   valueFrom:
    #     secretKeyRef:
    #       name: ""
    #       key: ""

    # ===== Google Cloud uploads configuration =====
    # - name: GCS_BUCKET_NAME
    #   value: ""
    # # default: https://storage.googleapis.com/${GCS_BUCKET_NAME}/
    # - name: GCS_DOMAIN
    #   value: ""
    # # not required when deployed to GCP with an instance service account
    # - name: GOOGLE_APPLICATION_CREDENTIALS
    #   valueFrom:
    #     secretKeyRef:
    #       name: ""
    #       key: ""

    # ===== OTEL configuration =====
    # Reference: https://docs.growthbook.io/self-host/env#observability-opentelemetry
    # - name: OTEL_SERVICE_NAME
    #   value: ""
    # - name: OTEL_EXPORTER_OTLP_ENDPOINT
    #   value: ""

mongodb:
  enabled: true

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations:
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: growthbook.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          # must be either "frontend" or "backend"
          service: frontend
    - host: api.growthbook.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          # must be either "frontend" or "backend"
          service: backend
  tls:
    []
    # - secretName: growthbook-tls
    #   hosts:
    #     - growthbook.local
    #     - api.growthbook.local
