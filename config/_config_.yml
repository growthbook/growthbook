organization:
  name: "GrowthBook PA Demo"

# One datasource per vertical — each points to the same postgres but a different schema.
# GrowthBook sets search_path to defaultSchema so unqualified tables resolve correctly.
datasources:
  pa_fintech:
    type: postgres
    name: "FinTech — Apex Financial"
    params:
      host: localhost
      port: 5433
      database: pademo
      user: pademo
      password: pademo
      ssl: false
      defaultSchema: fintech
    settings:
      userIdTypes:
        - userIdType: user_id
          description: Logged-in User ID
        - userIdType: anonymous_id
          description: Anonymous / pre-signup ID
      queries:
        exposure:
          - id: user_id
            name: Experiment Assignments
            userIdType: user_id
            query: >
              SELECT
                user_id,
                timestamp,
                experiment_id,
                variation_id,
                country,
                browser,
                user_role
              FROM
                fintech.experiment_viewed
            dimensions:
              - country
              - browser
              - user_role

